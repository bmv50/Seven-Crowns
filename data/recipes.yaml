# =====================================================================
#  РЕЦЕПТЫ КРАФТА (кузница)
#  station: где доступен крафт (npc) — сейчас только «кузнец»
#  inputs: список [item_id, количество] — расходуются при ковке
#  gold: дополнительная плата золотом
#  output: item_id, который выдаётся (1 шт.)
#  Крафт даёт материалам и золоту применение и обходит редкий лут.
#
#  ЭКОНОМИКА (после ребаланса цен экипировки, спринт 6): стоимость входа
#  (материалы + gold) держим ≈70% цены результата — крафт остаётся выгоднее
#  покупки готового у торговца/на аукционе, но не бесплатным. Материалы дёшевы
#  (их цены не поднимались), поэтому основную стоимость несёт gold. Пересчитано
#  скриптом scripts/rescale_prices не автоматически — золото рецептов правится
#  вручную под новую цену результата (см. test_economy: крафт рентабелен).
# =====================================================================

