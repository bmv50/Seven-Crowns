# =====================================================================
#  PITY-КРАФТ «КОНДЕНСАЦИЯ ТУМАНА» (этап 6.2)
#  Детерминированный путь к предмету ПОСЛЕ СЕРИИ НЕУДАЧ: разбирая ненужный
#  лут окна в «туманную пыль» (engine/salvage.py), игрок за ~2–2.5 сессии
#  фарма своего окна накапливает N пыли и конденсирует ГАРАНТИРОВАННЫЙ крепкий
#  предмет окна. Пыль имеет price 0 → выход дороже входа-золота (это pity, а не
#  бизнес): страховка от засухи, а не оптимальный способ добычи.
#
#  ВЫХОД — ЛЁГКАЯ БРОНЯ из items_gen. Почему броня, а не оружие: ни один ТИП
#  оружия не подходит ВСЕМ 6 классам (посох — не для разбойника, меч — не для
#  жреца/мага и т.д.), а лёгкая броня (armor_weight: light) входит в допустимые
#  веса КАЖДОГО класса (см. equip.CLASS_RULES) — один рецепт доступен всем.
#  Приоритет регламента: детерминизм + доступность каждому классу.
#  По одному рецепту на окно (10/20/30/40/50/60). Тиры брони — на ур.1/15/30/45/60,
#  поэтому окно 31-40 получает тир _45 в слоте «поножи» (отдельный слот, чтобы
#  выход не совпал с окном 41-50) — аспирационный предмет, надеваемый на ур.45.
#  N пыли откалибровано sim_loot_cadence: пыль с ~20 разобранных предметов окна.
# =====================================================================

