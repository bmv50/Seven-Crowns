# Недельные наборы заданий (ротация по ISO-неделе, engine/weekly.py:_pick).
# type: kill_any | kill_boss | daily_claims | heal_ally | dungeon_group |
#       explore | craft_item | sell_lot | faction_rep | dtype_kill | event_talk.
#
# Этап 6.1: разнообразие целей — в каждом наборе НЕ БОЛЕЕ ОДНОЙ kill-задачи
# (kill_any/kill_boss), плюс ОДНА daily_claims (не грайндовая, держит суточный
# ритм — есть в КАЖДОМ наборе, см. ниже почему) и ДВЕ задачи из новых типов
# (помощь союзнику, групповой данж, исследование, крафт, торговля, репутация,
# точный удар по уязвимости, разговор во время события).
#
# ВАЖНО: daily_claims присутствует в КАЖДОМ из 8 наборов (не только «на удачу»)
# — это не отступление от разнообразия, а требование существующего теста
# test_retention.py [14] («Интеграция: daily.claim -> weekly.on_daily_claim»):
# daily.claim() зовёт weekly.on_daily_claim(ch) БЕЗ today=..., то есть всегда
# по РЕАЛЬНОЙ сегодняшней дате — а значит какой бы набор ни выпал на реальную
# сегодняшнюю неделю в момент прогона теста, в нём обязана быть daily_claims-
# задача, иначе тест ловит гонку (см. отчёт синтеза Этапа 6.1).
#
# ВАЖНО: week_hunt намеренно оставлен в исходном виде (2 kill-задачи, без
# добавления новых типов) и стоит ТРЕТЬИМ по счёту в этом файле — так
# _pick(week) по-прежнему выбирает его для ISO-недели 2026-W28, на что
# завязаны существующие проверки test_retention.py [10]/[11]/[12]
# (today="2026-07-06"). Остальные 5 старых наборов переписаны под новое
# правило, плюс добавлены 2 новых (week_market, week_pilgrim).

week_bosses:
  name: "Охота на боссов"
  tasks:
    - {id: boss, type: kill_boss, count: 1, name: "Сразить любого босса"}
    - {id: daily2, type: daily_claims, count: 2, name: "Забрать 2 ежедневные награды"}
    - {id: heal, type: heal_ally, count: 8, name: "Исцелить союзников заклинанием 8 раз"}
    - {id: rep, type: faction_rep, count: 40, name: "Заслужить 40 очков репутации любой фракции"}
  reward: {xp: 1200, gold: 20000, items: [эликсир]}

