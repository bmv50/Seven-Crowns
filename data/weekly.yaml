    - {id: craft, type: craft_item, count: 3, name: "Сковать 3 предмета у кузнеца"}
    - {id: explore, type: explore, count: 12, name: "Обойти 12 новых уголков мира"}
  reward: {xp: 900, gold: 16000, items: [большое_зелье]}

