# Динамические мировые события (engine/events.py). Ссылаются на существующие
# зоны/мобов. zone=null → эффект глобальный.
#
# Схема (обратно совместима со «старым» форматом первых трёх событий):
#   type            invasion | fair | anomaly | prophecy
#   name / desc     заголовок и описание для анонса
#   zone            КОНКРЕТНАЯ зона эффекта (или null=глобально) — старый ключ;
#                   modifiers() и legacy-путь _start() опираются на него.
#   allowed_zones   ГДЕ событие может стартовать (для прямого запуска бога и
#                   подбора случайной зоны): список зон | "any" | "city" | "wild".
#                   Если задан, а zone не фиксирован — конкретная зона выбирается
#                   при старте из пересечения allowed_zones и карты мира.
#   duration        фиксированная длительность (сек) — старый ключ, дефолт кламп-центр;
#   duration_min /  границы длительности (сек): при прямом запуске бог/движок
#   duration_max    клампит запрошенное значение в [min, max]. Если заданы,
#                   но duration нет — дефолт = середина диапазона.
#   xp_mult/gold_mult/loot_mult   множители награды (границы модификаторов —
#                   значения ниже уже финальные, движок их не превышает).
#   mob/count/count_min/count_max/rooms_max   параметры спавна для invasion/миграции.
events:
  # ───────── СУЩЕСТВУЮЩИЕ 3 (формат сохранён, продолжают работать) ─────────
  invasion_ash:
    type: invasion
    name: "Нашествие из Пепла"
    desc: "Воинство Короля хлынуло на Пепельные Пустоши — отбейте натиск, награды щедрее!"
    zone: "Пепельные Пустоши"
    mob: пепельная_тварь
    count: 1
    rooms_max: 3
    duration: 1800
    xp_mult: 1.5
    gold_mult: 1.5
  fair_seven_crowns:
    type: fair
    name: "Ярмарка Семи Корон"
    desc: "По всем землям ярмарка — опыт и золото идут щедрее."
    zone: null
    duration: 3600
    xp_mult: 1.25
    gold_mult: 1.25
  anomaly_deep:
    type: anomaly
    name: "Разлом Глуби"
    desc: "В Затонувшем Городе истончилась ткань мира — добыча вдвое обильнее."
    zone: "Затонувший Город"
    duration: 2400
    loot_mult: 2.0
    xp_mult: 1.5

  # ───────── НОВЫЕ 4 (расширенная схема с allowed_zones и границами) ─────────
  # Туманный прилив — глобальная аномалия: туман наползает на все земли,
  # опыт и добыча щедрее. Без спавна, эффект global (zone=null).
  туманный_прилив:
    type: anomaly
    name: "Туманный прилив"
    desc: "Первотуман поднялся из глубин и укрыл все земли — опыт и добыча богаче для каждого."
    zone: null
    allowed_zones: "any"
    duration_min: 1800
    duration_max: 3600
    xp_mult: 1.25
    loot_mult: 1.15
  # Ярмарка гильдий — торговый праздник в городах: золото щедрее в городских
  # зонах. zone не фиксирован — выбирается случайно из городских при старте.
  ярмарка_гильдий:
    type: fair
    name: "Ярмарка гильдий"
    desc: "Гильдии съехались на торг — в городе звенит золото, сделки как никогда выгодны."
    allowed_zones: "city"
    duration_min: 3600
    duration_max: 7200
    gold_mult: 1.3
  # Миграция стаи — облегчённое вторжение: в дикую зону приходит 3–5 усиленных
  # зверей, за них — повышенная добыча. Спавн горных хищников (level 6).
  миграция_стаи:
    type: invasion
    name: "Миграция стаи"
    desc: "Через дикие земли идёт голодная стая — сильные звери, но и добыча с них щедрее."
    mob: горный_хищник
    allowed_zones: "wild"
    count_min: 3
    count_max: 5
    rooms_max: 5
    duration_min: 1200
    duration_max: 2400
    loot_mult: 1.2
    beast_buff: 1.25
  # Пророчество глубин — чистый нарратив: ни одного множителя, только зловещее
  # знамение в хронике мира. Короткое (10 минут).
  пророчество_глубин:
    type: prophecy
    name: "Пророчество глубин"
    desc: "Оракулы Бездны заговорили разом — их слова эхом расходятся по миру, но смысл тёмен."
    zone: null
    allowed_zones: "any"
    duration_min: 600
    duration_max: 600
