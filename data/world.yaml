# =====================================================================
#  МИР ЭХА ГЛУБИН
#  Структура: хаб-деревня → 3 ветки (лес / шахты / болото) → руины → трон
#  spawns: какие мобы возрождаются в комнате
#  zone: для группировки и фонового описания
# =====================================================================

# ───────────────────────── ХАБ ─────────────────────────
village:
  name: "Деревня Туманный Брод"
  zone: "Туманный Брод"
  desc: >
    Размокшая площадь маленькой деревни. Сквозь вечный туман проступают
    покосившиеся избы и колодец с проржавевшей цепью. У трактира мерцает
    фонарь, а на север, восток и юг расходятся истоптанные тропы.
  exits: { север: forest_edge, восток: mine_entrance, юг: swamp_road, запад: temple, вниз: well }
  npc: [старейшина, наставник_боя]
  spawns: []
  items: []

temple:
  name: "Святилище Рассвета"
  zone: "Туманный Брод"
  desc: >
    Маленький каменный храм, единственное место в деревне, куда не дотянулся
    туман. У алтаря молится седой жрец. Здесь можно отдохнуть и исцелиться.
  exits: { восток: village, запад: harbor_gate }
  npc: [жрец_храма]
  spawns: []
  items: []
  rest: true            # полное восстановление HP/MP

well:
  name: "Дно колодца"
  zone: "Подземелья"
  desc: >
    Дно старого колодца. Сыро, темно, пахнет плесенью. В стене — пролом,
    из которого тянет холодом подземелий.
  exits: { вверх: village, север: catacombs, восток: goblin_warren }
  spawns: [крыса, крыса, летучая_мышь]
  items: [факел]

# ───────────────────────── ВЕТКА 1: ЛЕС ─────────────────────────
forest_edge:
  name: "Опушка Шепчущего леса"
  zone: "Шепчущий лес"
  desc: >
    Древние сосны смыкаются над тропой. Ветер несёт обрывки чужих голосов.
    Тропа уходит глубже в чащу.
  exits: { юг: north_gate, север: forest_deep, запад: elf_glade }
  spawns: [волк, волк]
  items: [целебная_трава]

forest_deep:
  name: "Чаща Шепчущего леса"
  zone: "Шепчущий лес"
  desc: >
    Свет едва пробивается сквозь кроны. Меж корней мерцают бледные грибы.
    Откуда-то слышен звериный вой.
  exits: { юг: forest_edge, север: forest_glade, восток: spider_nest }
  spawns: [волк, лесной_дух, вожак_стаи]
  items: []

spider_nest:
  name: "Паучье логово"
  zone: "Шепчущий лес"
  desc: >
    Всё затянуто липкой паутиной. В сумраке поблёскивают десятки глаз.
    На земле — кокон с чем-то блестящим внутри.
  exits: { запад: forest_deep }
  spawns: [гигантский_паук]
  items: [серебряное_кольцо]

forest_glade:
  name: "Поляна Старого Дуба"
  zone: "Шепчущий лес"
  desc: >
    Тихая поляна с исполинским дубом. Под корнями — древняя руническая арка,
    ведущая к руинам. Воздух гудит от магии.
  exits: { юг: forest_deep, север: ruin_gate, восток: dawn_path }
  npc: [лесная_ведьма]
  spawns: [лесной_дух]
  items: []

# ───────────────────────── ВЕТКА 2: ШАХТЫ ─────────────────────────
mine_entrance:
  name: "Вход в Рудники Каменолома"
  zone: "Рудники"
  desc: >
    Заброшенный вход в рудник, подпёртый гнилыми балками. Из глубины
    доносится стук кирок — хотя добывать здесь давно некому.
  exits: { запад: east_gate, вниз: mine_shaft, восток: iron_keep_gate, север: dwarf_hold }
  npc: [кузнец]
  spawns: []
  items: []

mine_shaft:
  name: "Штольня"
  zone: "Рудники"
  desc: >
    Тёмный штрек, уходящий вниз. По стенам — следы кирок и засохшая кровь.
    В породе поблёскивают вкрапления руды.
  exits: { вверх: mine_entrance, север: mine_deep }
  spawns: [скелет, кобольд]
  items: [железная_руда]

mine_deep:
  name: "Глубокая выработка"
  zone: "Рудники"
  desc: >
    Огромная подземная полость. Здесь рудокопы откопали то, что копать
    не следовало. В дальней стене — пролом к катакомбам.
  exits: { юг: mine_shaft, запад: catacombs, север: ruin_gate, восток: crystal_cave }
  spawns: [кобольд, каменный_голем]
  items: []

crystal_cave:
  name: "Кристальная пещера"
  zone: "Рудники"
  desc: >
    Стены пещеры сплошь усыпаны мерцающими кристаллами, отражающими свет
    факела тысячью бликов. В центре, сложенный из живого камня и самоцветов,
    дремлет страж — пока кто-то не подойдёт слишком близко.
  exits: { запад: mine_deep }
  spawns: [кристальный_голем]
  items: [самоцвет]

catacombs:
  name: "Катакомбы"
  zone: "Подземелья"
  desc: >
    Бесконечные ниши с костями. Подземелья колодца, рудников и руин
    сходятся в этом мрачном месте. Мёртвые здесь не лежат спокойно.
  exits: { юг: well, восток: mine_deep, север: ruin_gate }
  spawns: [скелет, скелет, призрак]
  items: [древний_амулет]

# ───────────────────────── ВЕТКА 3: БОЛОТО ─────────────────────────
swamp_road:
  name: "Гать через Гнилотопь"
  zone: "Гнилотопь"
  desc: >
    Шаткая гать через топкое болото. Над водой висит зловонный пар,
    в трясине что-то ворочается.
  exits: { север: south_gate, юг: swamp_heart, восток: orc_camp }
  spawns: [болотная_тварь]
  items: [целебная_трава]

swamp_heart:
  name: "Сердце Гнилотопи"
  zone: "Гнилотопь"
  desc: >
    Островок посреди болота. На нём — покосившаяся хижина ведьмы и алтарь,
    залитый чем-то тёмным. Здесь сильна гнилостная магия.
  exits: { север: swamp_road, восток: ruin_gate, запад: windpass_low }
  npc: [болотная_знахарка]
  spawns: [болотная_тварь, утопленник]
  items: [болотный_цветок]

# ───────────────────────── ФИНАЛ ─────────────────────────
ruin_gate:
  name: "Врата Древних Руин"
  zone: "Руины Эха"
  desc: >
    Рушащиеся врата забытого храма. Сюда сходятся все пути — лес, рудники,
    катакомбы и болото. За вратами клубится осязаемая тьма.
  exits: { юг: forest_glade, вниз: catacombs, запад: mine_deep, север: throne, восток: ash_waste_edge }
  spawns: [тёмный_рыцарь]
  items: []

throne:
  name: "Тронный зал Падшего Короля"
  zone: "Руины Эха"
  desc: >
    Исполинский зал чёрного камня, тысяча погасших свечей. На троне из костей
    восседает Падший Король — источник тумана, что душит королевство.
  exits: { юг: ruin_gate }
  spawns: [падший_король]
  items: []

# ═════════════════════════ ЖЕЛЕЗНЫЙ ОСТРОГ (5–9) ═════════════════════════
iron_keep_gate:
  name: "Ворота Железного Острога"
  zone: "Железный Острог"
  desc: >
    Окованные железом створы поднимаются из тумана, как зубы древнего зверя.
    На стенах чадят факелы, арбалетчики милиции провожают каждого чужака
    прищуренным взглядом. За воротами лязгают молоты и пахнет горячей окалиной.
  exits: { запад: mine_entrance, север: iron_keep_market }
  npc: [острожный_страж]
  spawns: []
  items: []

iron_keep_market:
  name: "Рудный рынок"
  zone: "Железный Острог"
  desc: >
    Тесная площадь под навесами из просмолённой парусины. Тут торгуют рудой,
    кристаллами тумана и всем, что можно выменять на хлеб. Голоса перекупщиков
    тонут в общем гуле, а воздух дрожит от близких горнов.
  exits: { юг: iron_keep_gate, север: iron_keep_square, восток: iron_keep_tavern, запад: iron_keep_forge }
  npc: [острожный_перекупщик, острожный_зевака]
  spawns: []
  items: []

iron_keep_tavern:
  name: "Таверна «Гулкая Штольня»"
  zone: "Железный Острог"
  desc: >
    Низкий зал, прокопчённый дымом и временем. У стойки гремят кружками
    усталые рудокопы, в углу кто-то тихо поёт о тех, кто не вернулся снизу.
    Здесь можно перевести дух и согреться у очага.
  exits: { запад: iron_keep_market }
  npc: [острожная_трактирщица]
  spawns: []
  items: []
  rest: true

iron_keep_forge:
  name: "Кузнечная гильдия"
  zone: "Железный Острог"
  desc: >
    Сердце Острога: дюжина горнов ревёт, осыпая стены красными отблесками.
    Подмастерья таскают слитки, а воздух плотен от жара и звона металла.
    Здесь куётся всё, чем Острог отбивается от тумана.
  exits: { восток: iron_keep_market, север: iron_keep_hall }
  npc: [гильдейский_кузнец]
  spawns: []
  items: []

iron_keep_square:
  name: "Плац Милиции"
  zone: "Железный Острог"
  desc: >
    Утоптанная площадь, где ополчение Острога точит арбалеты и муштрует
    новобранцев. На помосте висит щербатый колокол тревоги. Со стен отсюда
    виден край штолен, тонущий в седой мгле.
  exits: { юг: iron_keep_market, восток: iron_keep_hall, север: iron_keep_stope }
  npc: [острожный_десятник]
  spawns: []
  items: []

iron_keep_hall:
  name: "Чертог Гильдии"
  zone: "Железный Острог"
  desc: >
    Высокий зал из тёсаного камня, увешанный знамёнами Вольных рудокопов и
    кирками павших мастеров. За столом из цельной плиты восседает та, чьё
    слово в Остроге — закон. Здесь решают, кому копать, а кому держать стену.
  exits: { юг: iron_keep_forge, запад: iron_keep_square }
  npc: [мастер_гильдии]
  spawns: []
  items: []

iron_keep_stope:
  name: "Заброшенная штольня"
  zone: "Железный Острог"
  desc: >
    Старый штрек за пределами стен, давно отданный туману. Из пролома сочится
    седая мгла, в породе тускло гудят кристаллы. Что-то скребёт во тьме, и милиция
    сюда не суётся без нужды.
  exits: { юг: iron_keep_square, восток: iron_keep_edge }
  npc: []
  spawns: [туманный_рудокоп, острожный_кобольд]
  items: [руда_тумана]

iron_keep_edge:
  name: "Туманная окраина"
  zone: "Железный Острог"
  desc: >
    Самый дальний пост Острога, где стена обрывается и начинается ничейная
    мгла. Здесь туман гуще всего, и из него выходят те, кого он уже не отпустил.
    Лишь треснувший межевой столб напоминает, где кончается людское.
  exits: { запад: iron_keep_stope }
  npc: []
  spawns: [туманный_рудокоп, штольный_призрак, кристальный_бур, острожный_буревестник]
  items: []

# ═════════════════════════ СТЫЛАЯ ГАВАНЬ (4–8) ═════════════════════════
harbor_gate:
  name: "Стылые Врата"
  zone: "Стылая Гавань"
  desc: >
    Просмолённая арка ворот на ветру с моря. За ними кривые улочки сбегают
    к причалам, где в сером тумане качаются мачты. Пахнет солью, рыбой и
    дёгтем; со стороны Святилища тянет ладаном.
  exits: { восток: temple, запад: harbor_square, юг: harbor_refugee_camp }
  npc: [портовый_зазывала]
  spawns: []
  items: []

harbor_square:
  name: "Рыночная площадь Гавани"
  zone: "Стылая Гавань"
  desc: >
    Тесная площадь под навесами из обрывков парусины. Торговцы зазывают,
    беженцы выменивают последнее, а у фонтана-чаши со ржавой водой
    греет руки караван Вольных торговцев. Тут небезопасно для кошелька,
    но не для жизни.
  exits: { восток: harbor_gate, север: harbor_caravan, запад: harbor_tavern, юг: harbor_docks }
  npc: [караванщик, рыночная_беженка]
  spawns: []
  items: []

harbor_caravan:
  name: "Стоянка каравана"
  zone: "Стылая Гавань"
  desc: >
    Кольцо крытых повозок и тощих волов. Над кострами сушатся диковинные
    товары из дальних земель, а сторожа лениво поглядывают на чужаков.
    Здесь Вольные торговцы держат то, что не выкладывают на площадь.
  exits: { юг: harbor_square }
  npc: [старшина_каравана]
  spawns: []
  items: []

harbor_tavern:
  name: "Таверна «Солёный якорь»"
  zone: "Стылая Гавань"
  desc: >
    Низкий зал, пропахший рыбьим жиром и дешёвым элем. У очага сохнут
    рыбацкие сети, в углу шепчутся тёмные люди о тёмных делах. Тепло и
    можно перевести дух.
  exits: { восток: harbor_square }
  npc: [трактирщик_гавани, рыбак_бывалый]
  spawns: []
  items: []
  rest: true

harbor_refugee_camp:
  name: "Лагерь беженцев"
  zone: "Стылая Гавань"
  desc: >
    Жалкие лачуги из досок и парусины, прилепившиеся к городской стене.
    Сюда бежали от тумана из Туманного Брода и дальше; в глазах — голод
    и страх, что туман дотянется и до моря.
  exits: { север: harbor_gate, запад: harbor_docks }
  npc: [капитан_порта]
  spawns: []
  items: []

harbor_docks:
  name: "Доки Стылой Гавани"
  zone: "Стылая Гавань"
  desc: >
    Скользкие от ила причалы уходят в туман над чёрной водой. Меж свай
    что-то скребётся, а из-под настила тянет могильным холодом. После
    заката сюда не суются даже контрабандисты.
  exits: { север: harbor_square, восток: harbor_refugee_camp, юг: harbor_smuggler_hold, запад: harbor_misty_pier }
  npc: []
  spawns: [туманная_крыса_трюма, матрос_утопленник, портовый_бродяга]
  items: [рыбацкая_сеть]

harbor_smuggler_hold:
  name: "Трюм контрабандистов"
  zone: "Стылая Гавань"
  desc: >
    Затхлый трюм севшего на мель когга, превращённый в склад краденого.
    Между бочек и ящиков с порченым товаром затаились те, кому не нужны
    свидетели. Воздух густой от плесени и угрозы.
  exits: { север: harbor_docks }
  npc: []
  spawns: [контрабандист_головорез, туманная_крыса_трюма]
  items: [ящик_контрабанды]

harbor_misty_pier:
  name: "Туманный причал"
  zone: "Стылая Гавань"
  desc: >
    Дальний причал, поглощённый плотным морским туманом. Из мглы доносится
    плеск и хор мокрых голосов: утонувшие команды бредут к берегу, не зная,
    что давно мертвы. Самое гиблое место Гавани.
  exits: { восток: harbor_docks }
  npc: []
  spawns: [матрос_утопленник, утопший_боцман, матрос_утопленник]
  items: []

# ═════════════════════════ ПЕПЕЛЬНЫЕ ПУСТОШИ (10–14, Акт III) ═════════════════════════
ash_waste_edge:
  name: "Кромка Пепельных Пустошей"
  zone: "Пепельные Пустоши"
  desc: >
    За Вратами руин земля обрывается в серую мёртвую равнину. Здесь ничего не
    растёт: лишь пепел да обугленные кости под ногами, а туман стоит сплошной
    стеной, гуще, чем где-либо в Аэльдмаре. Среди пепла горбится разбитый
    фургон — последнее убежище одинокого выжившего.
  exits: { запад: ruin_gate, восток: ash_waste_field, север: ash_burnt_chapel }
  npc: [разведчик_крон]
  spawns: [пепельная_тварь]
  items: []

ash_waste_field:
  name: "Пепельное поле"
  zone: "Пепельные Пустоши"
  desc: >
    Бескрайнее поле серого праха, по которому ветер гонит волны пепла. Из мглы
    проступают силуэты бредущих мертвецов — Воинство Короля не знает покоя
    даже после гибели своего якоря. Тропа вьётся к востоку и к обугленной
    впадине на юге.
  exits: { запад: ash_waste_edge, восток: ash_bone_road, юг: ash_sunken_hollow }
  spawns: [пепельная_тварь, пепельный_легионер]
  items: [горсть_пепла]

ash_burnt_chapel:
  name: "Сожжённая часовня"
  zone: "Пепельные Пустоши"
  desc: >
    Остов часовни Ордена, выжженной дотла в дни падения. Закопчённые своды ещё
    держатся, но алтарь расколот, а в нишах вместо святых стоят туманные тени.
    Здесь молится тот, кто давно мёртв.
  exits: { юг: ash_waste_edge, восток: ash_pyre_court }
  spawns: [туманный_плакальщик, пепельный_легионер]
  items: [тлеющий_псалтырь]

ash_bone_road:
  name: "Костяной тракт"
  zone: "Пепельные Пустоши"
  desc: >
    Древняя дорога, вымощенная не камнем, а вбитыми в пепел костями. По
    обочинам торчат копья с обрывками знамён Воинства. Тракт ведёт к чёрной
    цитадели на востоке, и каждый шаг отзывается эхом чужих стонов.
  exits: { запад: ash_waste_field, восток: ash_pyre_court }
  spawns: [пепельный_легионер, туманный_плакальщик]
  items: []

ash_pyre_court:
  name: "Двор Погребальных Костров"
  zone: "Пепельные Пустоши"
  desc: >
    Просторный двор у подножия цитадели, где горят костры из мёртвой плоти,
    источая зелёный дым. Здесь Воинство собирает свои легионы. Лестница в дыму
    ведёт к чёрному чертогу лейтенанта Короля.
  exits: { запад: ash_bone_road, юг: ash_burnt_chapel, север: ash_lieutenant_hall }
  spawns: [пепельный_легионер, пепельная_тварь]
  items: []

ash_lieutenant_hall:
  name: "Чертог Пепельного Рыцаря"
  zone: "Пепельные Пустоши"
  desc: >
    Чёрный зал без окон, освещённый лишь тлеющими углями под ногами. На троне
    из спёкшегося пепла восседает Пепельный Рыцарь — лейтенант Падшего Короля,
    что не сложил клинок и после гибели владыки. Воздух здесь почти не годен
    для дыхания.
  exits: { юг: ash_pyre_court }
  spawns: [пепельный_рыцарь]
  items: []

ash_sunken_hollow:
  name: "Провал Затонувшего"
  zone: "Пепельные Пустоши"
  desc: >
    Земля здесь проваливается в гигантскую воронку, на дне которой клубится
    туман чернее ночи — оттуда тянет солёной водой и древним холодом. Спуск,
    что веками стерегла мгла, наконец различим под ногами.
  exits: { север: ash_waste_field, вниз: deep_descent }
  spawns: [пепельный_страж_провала, туманный_плакальщик, пепельная_тварь, пепельный_ревенант]
  items: [осколок_глуби]

# ═════════════════════════ ЧЕРТОГИ РАССВЕТА (6–10) ═════════════════════════
dawn_path:
  name: "Восходная тропа"
  zone: "Чертоги Рассвета"
  desc: >
    Каменистая тропа круто взбирается от Поляны Старого Дуба в горы. Здесь
    туман редеет, но не сдаётся: меж валунов клубятся седые лоскуты, и из них
    выходят те, кого свет монастыря гонит прочь. Выше по склону, за пеленой,
    угадываются золотистые шпили Чертогов Рассвета.
  exits: { запад: forest_glade, север: dawn_switchback }
  npc: []
  spawns: [туманный_кающийся, восходный_упырь]
  items: [целебная_трава]

dawn_switchback:
  name: "Осадный серпантин"
  zone: "Чертоги Рассвета"
  desc: >
    Серпантин под самыми стенами обители, изрытый воронками святого огня.
    Здесь храмовники держат осаду: туман выдавливает к вратам нежить, и склон
    усеян оплавленными костями. На уступе горит сторожевой костёр, но никого
    живого рядом нет — лишь то, что бредёт из мглы.
  exits: { юг: dawn_path, север: dawn_gate }
  npc: []
  spawns: [восходный_упырь, осквернённый_храмовник, восходный_плакальщик, туманный_исполин]
  items: []

dawn_gate:
  name: "Врата Рассвета"
  zone: "Чертоги Рассвета"
  desc: >
    Окованные золочёной бронзой врата обители, над которыми высечено солнце
    Ордена. По стенам ходят паладины с воздетыми гизармами, и свет жаровен
    выжигает у порога всякую мглу. За воротами — тишина и святая строгость;
    туман сюда не входит.
  exits: { юг: dawn_switchback, север: dawn_courtyard }
  npc: [привратник_рассвета]
  spawns: []
  items: []

dawn_courtyard:
  name: "Внутренний двор обители"
  zone: "Чертоги Рассвета"
  desc: >
    Мощёный двор под открытым небом — здесь оно чище, чем где-либо в Аэльдмаре.
    Послушники с деревянными мечами отрабатывают выпады, а у колодца со святой
    водой Наставник правит осанку новобранцам. Со всех сторон поднимаются
    строгие стены Чертогов.
  exits: { юг: dawn_gate, север: dawn_cathedral, восток: dawn_cells, запад: dawn_abbot_hall }
  npc: [паладин_наставник, послушник_двора]
  spawns: []
  items: []

dawn_cathedral:
  name: "Собор Восходящего Света"
  zone: "Чертоги Рассвета"
  desc: >
    Исполинский неф, пронизанный столбами света из витражей-солнц. Под сводами
    висит запах ладана и горячего воска, а у главного алтаря в реликварии
    теплится Уголь Первого Рассвета. Здесь молятся и получают благословение
    перед вылазкой в туман.
  exits: { юг: dawn_courtyard }
  npc: [жрец_реликвария]
  spawns: []
  items: []
  rest: true

dawn_cells:
  name: "Кельи и лазарет"
  zone: "Чертоги Рассвета"
  desc: >
    Узкий коридор с дверьми тесных келий, где спят на голых досках. В конце —
    лазарет: ряды коек с ранеными после ночных вылазок, запах уксуса и трав.
    Здесь братья Ордена зализывают раны.
  exits: { запад: dawn_courtyard }
  npc: [послушник_лазарета]
  spawns: []
  items: []
  rest: true

dawn_abbot_hall:
  name: "Чертог Аббата"
  zone: "Чертоги Рассвета"
  desc: >
    Строгий зал без излишеств: голые каменные стены, длинный стол да карта
    окрестных земель, утыканная булавками с солнцами. В кресле под ликом
    восходящего солнца восседает Аббат — тот, чьё слово в Ордене равно закону.
  exits: { восток: dawn_courtyard }
  npc: [аббат_рассвета]
  spawns: []
  items: []

# ═════════════════════════ ПЕРЕВАЛ СТОНУЩИХ ВЕТРОВ (6–9) ═════════════════════════
windpass_low:
  name: "Подъём в горы"
  zone: "Перевал Стонущих Ветров"
  desc: >
    Тропа карабкается вверх, прочь от смрада Гнилотопи. Болотный пар сменяется
    колючим стылым ветром, что несёт с высот обрывки тумана и далёкий невнятный
    плач. Камни под ногами скользки от инея, а впереди в серую муть уходит теснина.
  exits: { восток: swamp_heart, север: windpass_gorge }
  npc: [застрявший_торговец]
  spawns: [горный_хищник]
  items: []

windpass_gorge:
  name: "Теснина Стонущих Ветров"
  zone: "Перевал Стонущих Ветров"
  desc: >
    Узкий каменный коридор меж отвесных стен. Ветер воет в трещинах так, что
    кажется, будто стонут тысячи глоток, а в порывах тумана мелькают бледные
    силуэты. Здесь легко сорваться вниз — и легко получить нож в спину.
  exits: { юг: windpass_low, север: windpass_outpost }
  npc: []
  spawns: [горный_хищник, горный_изгой, дух_ветра]
  items: []

windpass_outpost:
  name: "Заброшенная застава"
  zone: "Перевал Стонущих Ветров"
  desc: >
    Полуразрушенная сторожевая башня, занесённая снегом. Под обвалившейся
    кровлей тлеет чей-то костёр, кругом — раскиданное тряпьё и обглоданные кости.
    Изгои сделали из руин своё логово.
  exits: { юг: windpass_gorge, север: windpass_bridge }
  npc: [горный_отшельник]
  spawns: [горный_изгой, замёрзший_мертвец]
  items: []

windpass_bridge:
  name: "Мост над пропастью"
  zone: "Перевал Стонущих Ветров"
  desc: >
    Древний каменный мост, переброшенный через бездонную расселину. Половина
    перил давно рухнула вниз, в клубящийся туман, откуда тянет могильным холодом.
    Ветер раскачивает обледенелые пролёты.
  exits: { юг: windpass_outpost, север: windpass_summit }
  npc: []
  spawns: [дух_ветра, замёрзший_мертвец]
  items: []

windpass_summit:
  name: "Вершина перевала"
  zone: "Перевал Стонущих Ветров"
  desc: >
    Высшая точка прохода, где ветер бьёт с такой силой, что валит с ног. Здесь
    туман редеет, открывая зубцы чёрных вершин до самого горизонта. Среди
    обледенелых валунов засел главарь изгоев.
  exits: { юг: windpass_bridge, север: windpass_descent }
  npc: []
  spawns: [главарь_изгоев]
  items: []

windpass_descent:
  name: "Спуск к дальним землям"
  zone: "Перевал Стонущих Ветров"
  desc: >
    Тропа ныряет вниз по северному склону и обрывается у заснеженного карниза.
    Отсюда видно, как далеко внизу мерцают огни чужих земель, к которым ещё нет
    дороги. Ветер здесь тише — лишь скулит в камнях.
  exits: { юг: windpass_summit }
  npc: []
  spawns: [дух_ветра, морозный_воевода]
  items: [горный_самоцвет]

# ═════════════════════════ ЗАТОНУВШИЙ ГОРОД (13–16, ФИНАЛ Акта III) ═════════════════════════
deep_descent:
  name: "Спуск в Глубь"
  zone: "Затонувший Город"
  desc: >
    Мгла, что веками затягивала провал, расступилась — и открыла осклизлый
    спуск по выщербленным ступеням в чёрную утробу земли. Стены сочатся
    солёной водой, в ушах нарастает древний зов, а внизу проступают крыши
    затонувшего города.
  exits: { вверх: ash_sunken_hollow, вниз: deep_streets }
  npc: [плакальщица_порога]
  spawns: [глубинный_утопленник]
  items: []

deep_streets:
  name: "Затопленные улицы"
  zone: "Затонувший Город"
  desc: >
    Кривые улицы древнего города стоят по пояс в чёрной стоячей воде. Из
    проёмов утонувших домов смотрят пустые окна, оплетённые бледными
    водорослями, а по дну скользят тени тех, кто здесь утонул и не упокоился.
  exits: { вверх: deep_descent, восток: deep_plaza }
  npc: []
  spawns: [глубинный_утопленник, левиафанов_отпрыск, костяной_легат, глубинный_кошмар]
  items: [глубинный_перламутр]

deep_plaza:
  name: "Площадь Утонувших"
  zone: "Затонувший Город"
  desc: >
    Просторная площадь, где над чёрной водой ещё высятся статуи забытых
    владык, изъеденные солью до безликости. Здесь жрецы Глуби сгоняют
    утопленников в безмолвные процессии к храму.
  exits: { запад: deep_streets, восток: deep_temple, вниз: deep_abyss }
  npc: []
  spawns: [глубинный_жрец, левиафанов_отпрыск, глубинный_утопленник]
  items: []

deep_temple:
  name: "Храм Утонувших Богов"
  zone: "Затонувший Город"
  desc: >
    Циклопический храм, посвящённый богам, что утонули раньше людей. Колонны
    в форме щупалец вздымаются из воды к своду. У чёрного алтаря верховный
    жрец Глуби возносит хвалу Голосу.
  exits: { запад: deep_plaza }
  npc: []
  spawns: [верховный_жрец_глуби, глубинный_жрец]
  items: [трезубец_глуби]

deep_abyss:
  name: "Бездна Глуби"
  zone: "Затонувший Город"
  desc: >
    Дно города обрывается в бездну, у которой нет дна — лишь чернота да холод,
    от которого стынет душа. Отсюда, из раны в недрах мира, сочится Туман,
    поднимаясь к поверхности седыми лентами.
  exits: { вверх: deep_plaza, вниз: deep_throne }
  npc: [голос_глубин]
  spawns: [бездонная_тварь, левиафанов_отпрыск, тварь_разлома, первотуманный_жнец]
  items: [осколок_глуби]

deep_throne:
  name: "Сердце Глуби"
  zone: "Затонувший Город"
  desc: >
    Дно бездны, где Туман не сочится, а рождается. Здесь, в чаше из живого
    мрака, пульсирует Источник — исполинское око, истинная рана мира, что
    дышит туманом с начала времён. Сразить его — значит покончить с туманом.
  exits: { вверх: deep_abyss, вниз: abyss_gate }
  npc: [голос_глубин]
  spawns: [сердце_глуби]
  items: []


# ═════════════════════════ ГНОМИЙ ЧЕРТОГ (старт гномов, 1–3) ═════════════════════════
dwarf_hold:
  name: "Гномий Чертог"
  zone: "Гномий Чертог"
  desc: >
    Тёсаный из живого камня зал у входа в рудники, освещённый ровным светом
    самоцветных ламп. Под низкими сводами гулко стучат кружки и кирки: здесь
    Вольные рудокопы держат подгорную заставу. На юг уводит штрек к шахтам.
  exits: { север: dwarf_tavern, восток: dwarf_drift, запад: dwarf_dig, юг: mine_entrance }
  npc: [dwarf_trainer, штейгер_заставы, гном_лавочник]
  spawns: []
  items: []

dwarf_tavern:
  name: "Таверна «Каменный Очаг»"
  zone: "Гномий Чертог"
  desc: >
    Низкий тёплый зал, вырубленный в породе, с очагом из светящегося кварца.
    У дубовых столов гремят кружками бородатые рудокопы и спорят о жилах.
    Здесь можно отогреться перед спуском в штольни.
  exits: { юг: dwarf_hold }
  npc: [гном_подмастерье]
  spawns: []
  items: []
  rest: true

dwarf_drift:
  name: "Старый штрек"
  zone: "Гномий Чертог"
  desc: >
    Заброшенный боковой штрек, куда давно не ступала нога рудокопа. С низкого
    свода капает вода, по стенам поблёскивает кварц, а в темноте шуршит мелкое
    и зубастое.
  exits: { запад: dwarf_hold, восток: dwarf_cavern }
  npc: []
  spawns: [рудничная_крыса, штрековый_кобольдёныш, рудничная_крыса]
  items: []

dwarf_cavern:
  name: "Сырая пещерка"
  zone: "Гномий Чертог"
  desc: >
    Природная полость, до которой дорылись рудокопы и бросили. Сталактиты
    сочатся сыростью, под ногами хлюпает, а на влажном камне подрагивают
    студенистые комья пещерных слизней.
  exits: { запад: dwarf_drift }
  npc: []
  spawns: [пещерный_слизень, породный_клещ, пещерный_слизень]
  items: [глыба_кварца]

dwarf_dig:
  name: "Учебная выработка"
  zone: "Гномий Чертог"
  desc: >
    Короткая выработка, где подмастерья учатся махать киркой. Но в трещинах
    завелись породные клещи, а из дальнего лаза тянет холодком.
  exits: { восток: dwarf_hold }
  npc: []
  spawns: [породный_клещ, рудничная_крыса]
  items: []

# ═════════════════════════ ЛУННЫЙ ПРЕДЕЛ (старт эльфов, 1–3) ═════════════════════════
elf_glade:
  name: "Лунная Прогалина"
  zone: "Лунный Предел"
  desc: >
    Сердце древесного анклава: исполинский серебролистый ясень, в чьих корнях
    вырезаны покои эльфов. Сквозь шепчущую листву сочится лунный свет, и даже
    туман здесь редеет. Тропа на восток ныряет к опушке Шепчущего леса.
  exits: { восток: forest_edge, север: elf_moonspring, запад: elf_archers_walk, юг: elf_thornward }
  npc: [elf_trainer, elf_keeper, elf_warden, elf_ambient_sprite]
  spawns: []
  items: []

elf_moonspring:
  name: "Лунный Родник"
  zone: "Лунный Предел"
  desc: >
    Укромная заводь под кроной, где из-под корней бьёт ключ, светящийся
    холодным серебром. Вода поёт тихую колыбельную, и раны затягиваются сами.
  exits: { юг: elf_glade }
  npc: []
  spawns: []
  items: []
  rest: true

elf_archers_walk:
  name: "Стрелковая Тропа"
  zone: "Лунный Предел"
  desc: >
    Подвесные мостки вьются меж стволов, где юные стрелки бьют по мишеням из
    коры. Дальше тропа сходит к подлеску, и оттуда тянет звериной шерстью.
  exits: { восток: elf_glade, запад: elf_glade_outer }
  npc: []
  spawns: [лунный_мотылёк, порченый_лис]
  items: [целебная_трава]

elf_glade_outer:
  name: "Дальний Подлесок"
  zone: "Лунный Предел"
  desc: >
    Край анклава, где серебролистые деревья мельчают, а туман наглеет. В
    бледном свете мелькают огромные мотыльки и крадутся порченые звери.
  exits: { восток: elf_archers_walk }
  npc: []
  spawns: [порченый_лис, лунопряха, порченый_олень]
  items: []

elf_thornward:
  name: "Терновый Дозор"
  zone: "Лунный Предел"
  desc: >
    Южная окраина рощи, обнесённая живой изгородью терновника. За шипами в
    тумане бродят порченые олени, бьющие копытом и рогом.
  exits: { север: elf_glade }
  npc: []
  spawns: [порченый_олень, лунопряха]
  items: []

# ═════════════════════════ КРОВАВЫЙ КРЯЖ (старт орков, 1–3) ═════════════════════════
orc_camp:
  name: "Острог Кровавого Кряжа"
  zone: "Кровавый Кряж"
  desc: >
    Частокол из заострённых брёвен над самой Гнилотопью. Над воротами скалятся
    черепа болотных тварей, у костров точат тесаки кряжистые орки. На запад
    спускается шаткая гать.
  exits: { запад: swamp_road, восток: orc_warlord_tent, север: orc_training_yard, юг: orc_mire_edge }
  npc: [orc_trainer, orc_quartermaster, orc_warband_caller, orc_ambient_whelp]
  spawns: []
  items: []

orc_warlord_tent:
  name: "Шатёр Вождя"
  zone: "Кровавый Кряж"
  desc: >
    Просторный шатёр из шкур, пропахший дымом и жжёной костью. В очаге гудит
    огонь, на жердях висят трофейные клыки и щиты. Здесь воины набираются сил.
  exits: { запад: orc_camp }
  npc: [orc_warlord]
  spawns: []
  items: []
  rest: true

orc_training_yard:
  name: "Двор Испытаний"
  zone: "Кровавый Кряж"
  desc: >
    Утоптанная до камня площадка, где молодняк лупит тупыми тесаками чучела.
    Из-за северной засеки в острог забредает болотная нечисть.
  exits: { юг: orc_camp, север: orc_blood_thicket }
  npc: []
  spawns: [болотный_кабан, степной_падальщик]
  items: []

orc_blood_thicket:
  name: "Кровавый ельник"
  zone: "Кровавый Кряж"
  desc: >
    Чахлый ельник на склоне кряжа, где земля бурая от старой крови охот. В
    бурелом орки сгоняют дичь покрупнее, и здесь залегают матёрые секачи.
  exits: { юг: orc_training_yard }
  npc: []
  spawns: [степной_падальщик, клыкастый_секач, болотный_кабан]
  items: []

orc_mire_edge:
  name: "Топкая закраина"
  zone: "Кровавый Кряж"
  desc: >
    Здесь частокол обрывается, и кряж сползает в чёрную жижу Гнилотопи. Меж
    кочек булькает гнилая вода, а в осоке шевелится то, что лучше не трогать.
  exits: { север: orc_camp }
  npc: []
  spawns: [трясинная_пиявка, болотный_кабан, степной_падальщик]
  items: []

# ═════════════════════════ ГОБЛИНСКАЯ НОРА (старт гоблинов, 1–3) ═════════════════════════
goblin_warren:
  name: "Гоблинская Нора"
  zone: "Гоблинская Нора"
  desc: >
    Тесная пещера под дном колодца, где гоблины-торгаши устроили подземный
    рынок. Свет жирников пляшет на грудах краденого тряпья, из лазов тянет
    сыростью и чесночным варевом. На запад — лаз к колодцу.
  exits: { запад: well, север: gob_nochlezhka, восток: gob_tunnel_west, юг: gob_tunnel_deep }
  npc: [goblin_trainer, барыга_крук, главарь_норы, норный_оборванец]
  spawns: []
  items: []

gob_nochlezhka:
  name: "Нора-ночлежка"
  zone: "Гоблинская Нора"
  desc: >
    Низкий лаз, устланный ворохом краденых одеял и обглоданных костей. В углу
    тлеет очажок с чесночным котелком. Место сонное и безопасное.
  exits: { юг: goblin_warren }
  npc: []
  spawns: []
  items: []
  rest: true

gob_tunnel_west:
  name: "Крысиный лаз"
  zone: "Гоблинская Нора"
  desc: >
    Узкий извилистый туннель, прогрызенный в мягкой породе. По стенам шуршат
    лапки, из темноты блестят красные бусины глаз.
  exits: { запад: goblin_warren, север: gob_tunnel_spider }
  npc: []
  spawns: [туннельная_крыса, туннельная_крыса, норный_слизень]
  items: []

gob_tunnel_spider:
  name: "Паутинный закуток"
  zone: "Гоблинская Нора"
  desc: >
    Тупиковый карман туннеля, затянутый липкой паутиной. С потолка свисают
    коконы, в трещинах копошатся паучьи выводки.
  exits: { юг: gob_tunnel_west }
  npc: []
  spawns: [пещерный_паучок, пещерный_паучок, туннельная_крыса]
  items: []

gob_tunnel_deep:
  name: "Глубокий ход"
  zone: "Гоблинская Нора"
  desc: >
    Туннель ныряет глубже под колодец, где своды сочатся ледяной водой. Воздух
    могильно-сырой, из ниш тянет мертвечиной.
  exits: { север: goblin_warren }
  npc: []
  spawns: [туннельный_упырёк, норный_слизень, пещерный_паучок]
  items: []

# ═════════════════════════ СЕРДЦЕ БЕЗДНЫ (эндгейм 40+) ═════════════════════════
abyss_gate:
  name: "Врата Бездны"
  zone: "Сердце Бездны"
  desc: >
    За троном Глуби разверзлась пропасть, какой не знал ни один смертный.
    Воздух густ, как смола, и шепчет именами мёртвых. Здесь начинается то,
    что было до Семи Корон.
  exits: { вверх: deep_throne, вниз: abyss_maw }
  npc: [хранитель_бездны]
  spawns: [бездонный_ужас]
  items: []
abyss_maw:
  name: "Зев Бездны"
  zone: "Сердце Бездны"
  desc: >
    Стены сочатся первотуманом. Каждый шаг отзывается эхом, будто сама бездна
    дышит в такт твоему сердцу.
  exits: { вверх: abyss_gate, восток: abyss_warrens, вниз: abyss_sanctum }
  spawns: [бездонный_ужас, пожиратель_света]
  items: []
abyss_warrens:
  name: "Норы Безмолвия"
  zone: "Сердце Бездны"
  desc: >
    Лабиринт нор, прогрызенных тварями, что бегут от света. В дальнем зале
    клубится тьма — там пробуждается Глашатай.
  exits: { запад: abyss_maw }
  spawns: [пожиратель_света, теневой_левиафан]
  items: []
abyss_sanctum:
  name: "Святилище Первотумана"
  zone: "Сердце Бездны"
  desc: >
    Древний алтарь, старше богов. Здесь Туман обретает форму титана, и горе
    тому, кто потревожит его в одиночку.
  exits: { вверх: abyss_maw, вниз: abyss_core }
  spawns: [теневой_левиафан]
  items: []
abyss_core:
  name: "Зрачок Предвечной"
  zone: "Сердце Бездны"
  desc: >
    Дно всего сущего. В абсолютной тьме раскрывается исполинский зрачок —
    Предвечная Бездна, из которой родился даже Падший Король.
  exits: { вверх: abyss_sanctum }
  spawns: []
  items: []
