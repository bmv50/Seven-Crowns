# ═══ ЛЕГЕНДАРНАЯ ЦЕПОЧКА «СЕРДЦЕ БЕЗДНЫ» (эндгейм, гейт по уровню) ═══
abyss_call:
  name: "Зов Бездны"
  giver: хранитель_бездны
  turn_in: хранитель_бездны
  min_level: 40
  desc: >
    «Бездна почуяла тебя. Спустись и проредь её передовых тварей — убей 8
    бездонных ужасов, чтобы доказать, что ты не пища.»
  objective: { type: kill, mob: бездонный_ужас, count: 8 }
  reward: { xp: 4000, gold: 60000, items: [осколок_первотумана] }
abyss_light:
  name: "Свет, что пожрали"
  giver: хранитель_бездны
  turn_in: хранитель_бездны
  requires: abyss_call
  desc: >
    «Пожиратели гасят последние искры под землёй. Уничтожь 6 — верни этим
    глубинам хотя бы тень света.»
  objective: { type: kill, mob: пожиратель_света, count: 6 }
  reward: { xp: 6000, gold: 90000, items: [осколок_первотумана] }
abyss_leviathan:
  name: "Тень левиафана"
  giver: хранитель_бездны
  turn_in: хранитель_бездны
  requires: abyss_light
  desc: >
    «Теневые левиафаны — стражи нижних врат. Срази 5, и я доверю тебе доспех,
    что носили павшие до тебя.»
  objective: { type: kill, mob: теневой_левиафан, count: 5 }
  reward: { xp: 9000, gold: 120000, items: [эгида_бездны] }
abyss_herald:
  name: "Глашатай умолкнет"
  giver: хранитель_бездны
  turn_in: хранитель_бездны
  requires: abyss_leviathan
  min_level: 45
  desc: >
    «Глашатай Бездны трубит сбор для того, что спит на дне. Заставь его
    умолкнуть — и выкуй из его молчания клинок.»
  objective: { type: kill, mob: глашатай_бездны, count: 1 }
  reward: { xp: 16000, gold: 220000, items: [клинок_угасшего_солнца] }
abyss_eternal:
  name: "Предвечная Бездна"
  giver: хранитель_бездны
  turn_in: хранитель_бездны
  requires: abyss_herald
  min_level: 50
  desc: >
    «То, из чего родился даже Падший Король, открыло зрачок. Сойди в Зрачок
    Предвечной и сделай то, что не смогли Семь Корон. Собери отряд — в одиночку
    оттуда не возвращаются.»
    ⚔️ Финал для слаженной группы или перерождённых — в одиночку без реморта не выжить.
  objective: { type: kill, mob: предвечная_бездна, count: 1 }
  reward: { xp: 60000, gold: 600000, items: [венец_семи_корон] }
