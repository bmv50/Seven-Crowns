# =====================================================================
#  КВЕСТЫ
#  giver: NPC, который выдаёт; turn_in: NPC, которому сдавать
#  objective: тип цели
#    kill: убить N мобов mob_id
#    collect: иметь N предметов item_id (заберутся при сдаче)
#  reward: xp, gold, items
#  requires (опц.): квест, который надо сдать раньше
# =====================================================================

spider_hunt:
  name: "Паучья угроза"
  giver: лесная_ведьма
  turn_in: лесная_ведьма
  desc: >
    Лесная ведьма просит избавить чащу от паучьего гнезда. Убей гигантского
    паука в логове на востоке от чащи.
  objective: { type: kill, mob: гигантский_паук, count: 1 }
  reward: { xp: 80, gold: 6000, items: [эликсир] }

purify_swamp:
  name: "Очищение Гнилотопи"
  giver: болотная_знахарка
  turn_in: болотная_знахарка
  desc: >
    Знахарка просит принести святую воду из храма Рассвета, чтобы очистить
    осквернённый алтарь. Загляни к жрецу в деревенском святилище.
  objective: { type: collect, item: святая_вода, count: 1 }
  reward: { xp: 70, gold: 5000, items: [болотный_цветок] }

ore_supply:
  name: "Поставка руды"
  giver: кузнец
  turn_in: кузнец
  desc: >
    Кузнецу нужна железная руда из шахт, чтобы ковать оружие. Принеси 3 куска
    железной руды — добывается с кобольдов и в штольнях.
  objective: { type: collect, item: железная_руда, count: 3 }
  reward: { xp: 60, gold: 4000, items: [железный_меч] }

wolf_cull:
  name: "Крысы в погребах"
  giver: старейшина
  turn_in: старейшина
  desc: >
    В погребах под площадью расплодились крысы и портят зимние запасы. Спустись
    в подвал (вниз с площади) и выведи их — убей 6 подвальных крыс.
  objective: { type: kill, mob: подвальная_крыса, count: 6 }
  reward: { xp: 55, gold: 3500, items: [малое_зелье] }

alpha_hunt:
  name: "Вожак стаи"
  giver: лесная_ведьма
  turn_in: лесная_ведьма
  desc: >
    Стаей правит матёрый вожак — пока он жив, волки не отступят. Выследи и
    убей Вожака стаи в чаще леса.
  objective: { type: kill, mob: вожак_стаи, count: 1 }
  reward: { xp: 90, gold: 5000, items: [кольцо_ловкости] }
  requires: spider_hunt

catacomb_cleanse:
  name: "Покой мёртвым"
  giver: жрец_храма
  turn_in: жрец_храма
  desc: >
    Нежить поднимается в катакомбах под деревней. Жрец просит упокоить
    5 древних скелетов, чтобы мёртвые обрели покой.
  objective: { type: kill, mob: скелет, count: 5 }
  reward: { xp: 85, gold: 4500, items: [эликсир] }

crystal_guardian:
  name: "Кристальный страж"
  giver: кузнец
  turn_in: кузнец
  desc: >
    В восточной пещере рудников пробудился кристальный голем, и кузнец
    жаждет его сердце для своих опытов. Сокруши Кристального голема.
  objective: { type: kill, mob: кристальный_голем, count: 1 }
  reward: { xp: 130, gold: 8000, items: [амулет_силы] }
  requires: ore_supply

drowned_rest:
  name: "Тихая вода"
  giver: болотная_знахарка
  turn_in: болотная_знахарка
  desc: >
    Утопленники не дают покоя Гнилотопи. Знахарка просит упокоить троих,
    чтобы болото утихло.
  objective: { type: kill, mob: утопленник, count: 3 }
  reward: { xp: 100, gold: 5500, items: [большое_зелье] }
  requires: purify_swamp

king_slayer:
  name: "Сразить Падшего Короля"
  giver: старейшина
  turn_in: старейшина
  desc: >
    Главная угроза. Старейшина молит избавить королевство от Падшего Короля,
    что засел в тронном зале за древними вратами.
  objective: { type: kill, mob: падший_король, count: 1 }
  reward: { xp: 500, gold: 100000, items: [] }
  requires: null

# ═════════════════════════ ЖЕЛЕЗНЫЙ ОСТРОГ ═════════════════════════
iron_militia:
  name: "Ополчение Острога"
  giver: острожный_десятник
  turn_in: острожный_десятник
  desc: >
    Из заброшенной штольни к стенам лезут острожные кобольды. Десятник милиции
    просит проредить их — убей 5 острожных кобольдов.
  objective: { type: kill, mob: острожный_кобольд, count: 5 }
  reward: { xp: 130, gold: 7000, items: [острожный_клинок] }

iron_ore_haul:
  name: "Руда для горнов"
  giver: гильдейский_кузнец
  turn_in: гильдейский_кузнец
  desc: >
    Горнам гильдии нужна руда тумана из старых штолен. Принеси 4 куска руды
    тумана — добывается с острожных кобольдов и в заброшенной штольне.
  objective: { type: collect, item: руда_тумана, count: 4 }
  reward: { xp: 110, gold: 6000, items: [острожная_бронь] }

iron_stope_cleanse:
  name: "Тишина в штольнях"
  giver: мастер_гильдии
  turn_in: мастер_гильдии
  desc: >
    Туман сводит рудокопов с ума и поднимает их вновь. Мастер гильдии велит
    упокоить тех, кого мгла уже забрала — убей 4 туманных рудокопов.
  objective: { type: kill, mob: туманный_рудокоп, count: 4 }
  reward: { xp: 150, gold: 8000, items: [рудокопский_оберег] }
  requires: iron_ore_haul

iron_storm_hunt:
  name: "Сердце бури"
  giver: мастер_гильдии
  turn_in: мастер_гильдии
  desc: >
    На туманной окраине из мглы соткался буревестник — и пока он жив, штольни
    не вернуть. Мастер гильдии доверяет тебе сразить Буревестника тумана.
  objective: { type: kill, mob: острожный_буревестник, count: 1 }
  reward: { xp: 220, gold: 15000, items: [амулет_бури] }
  requires: iron_stope_cleanse

# ═════════════════════════ СТЫЛАЯ ГАВАНЬ ═════════════════════════
harbor_rats_purge:
  name: "Твари под причалом"
  giver: капитан_порта
  turn_in: капитан_порта
  desc: >
    Туманные крысы расплодились в доках и грызут сваи. Капитан Ингрид
    просит истребить 5 туманных крыс трюма, пока причалы не рухнули.
  objective: { type: kill, mob: туманная_крыса_трюма, count: 5 }
  reward: { xp: 90, gold: 5000, items: [малое_зелье] }

harbor_net_supply:
  name: "Сети для лагеря"
  giver: рыбак_бывалый
  turn_in: рыбак_бывалый
  desc: >
    Беженцам нечем кормиться. Бывалый рыбак просит принести 3 рыбацкие
    сети с доков, чтобы наладить лов в гавани.
  objective: { type: collect, item: рыбацкая_сеть, count: 3 }
  reward: { xp: 70, gold: 4000, items: [штормовая_куртка] }

harbor_smuggler_bust:
  name: "Тёмные дела в трюме"
  giver: капитан_порта
  turn_in: капитан_порта
  desc: >
    В трюме севшего на мель когга засели контрабандисты. Капитан Ингрид
    просит разобраться: убей 4 головорезов.
  objective: { type: kill, mob: контрабандист_головорез, count: 4 }
  reward: { xp: 130, gold: 9000, items: [просоленный_клинок] }
  requires: harbor_rats_purge

harbor_drowned_boatswain:
  name: "Голоса в тумане"
  giver: капитан_порта
  turn_in: капитан_порта
  desc: >
    С туманного причала бредут утонувшие команды. Принеси промокший журнал
    с утопленников, чтобы узнать имя сгинувшего корабля.
  objective: { type: collect, item: промокший_журнал, count: 1 }
  reward: { xp: 160, gold: 11000, items: [китобойный_гарпун] }
  requires: harbor_smuggler_bust

# ═════════════════════════ ПЕПЕЛЬНЫЕ ПУСТОШИ ═════════════════════════
ash_clear_field:
  name: "Прах к праху"
  giver: разведчик_крон
  turn_in: разведчик_крон
  desc: >
    Разведчик Крон не может высунуться из фургона: Воинство Короля бродит даже
    после гибели владыки. Перебей 6 пепельных тварей, чтобы расчистить путь.
  objective: { type: kill, mob: пепельная_тварь, count: 6 }
  reward: { xp: 320, gold: 15000, items: [саван_скитальца] }

ash_burnt_faith:
  name: "Угли веры"
  giver: разведчик_крон
  turn_in: разведчик_крон
  desc: >
    В сожжённой часовне на севере погибли братья Ордена, что шли с Кроном.
    Принеси тлеющий псалтырь с их алтаря — пусть хоть память о них уцелеет.
  objective: { type: collect, item: тлеющий_псалтырь, count: 1 }
  reward: { xp: 300, gold: 13000, items: [посох_тумана] }
  requires: ash_clear_field

ash_legion_break:
  name: "Сломить легион"
  giver: разведчик_крон
  turn_in: разведчик_крон
  desc: >
    Воинство собирает легионы у погребальных костров. Перебей 5 пепельных
    легионеров на тракте и во дворе костров, чтобы обескровить их строй.
  objective: { type: kill, mob: пепельный_легионер, count: 5 }
  reward: { xp: 360, gold: 18000, items: [пепельные_латы] }
  requires: ash_burnt_faith

ash_lieutenant_fall:
  name: "Падение лейтенанта"
  giver: разведчик_крон
  turn_in: разведчик_крон
  desc: >
    Пока Пепельный Рыцарь сидит на троне в чёрном чертоге, Воинство не
    рассеется. Срази последнего лейтенанта Падшего Короля.
  objective: { type: kill, mob: пепельный_рыцарь, count: 1 }
  reward: { xp: 600, gold: 50000, items: [амулет_глуби] }
  requires: ash_legion_break

ash_scout_abyss:
  name: "Зов из провала"
  giver: разведчик_крон
  turn_in: разведчик_крон
  desc: >
    Из чёрной воронки на юге тянет морской водой и древним зовом. Перебей
    4 стражей провала, чтобы разведать спуск вниз, к Затонувшему Городу.
  objective: { type: kill, mob: пепельный_страж_провала, count: 4 }
  reward: { xp: 500, gold: 26000, items: [эликсир] }
  requires: ash_lieutenant_fall

# ═════════════════════════ ЧЕРТОГИ РАССВЕТА ═════════════════════════
dawn_gate_defense:
  name: "Оборона Врат"
  giver: паладин_наставник
  turn_in: паладин_наставник
  desc: >
    Туман выдавливает нежить к самым вратам обители. Наставник Гэвейн велит
    проредить осаждающих — упокой 6 восходных упырей на серпантине под стенами.
  objective: { type: kill, mob: восходный_упырь, count: 6 }
  reward: { xp: 150, gold: 7000, items: [освящённый_клинок] }

dawn_cleanse_relics:
  name: "Очистить осквернённый придел"
  giver: жрец_реликвария
  turn_in: жрец_реликвария
  desc: >
    Павшие братья поднялись осквернёнными храмовниками, унеся святые образки в
    скверну. Собери 4 осквернённых образка с подступов — Орден очистит их.
  objective: { type: collect, item: осквернённый_образок, count: 4 }
  reward: { xp: 170, gold: 8000, items: [реликварий_зари] }
  requires: dawn_gate_defense

dawn_fallen_brothers:
  name: "Милость к падшим"
  giver: паладин_наставник
  turn_in: паладин_наставник
  desc: >
    Тяжелее всего поднять клинок на своих. Тех, кого туман обратил в
    осквернённых храмовников, нельзя оставить так — даруй покой пятерым.
  objective: { type: kill, mob: осквернённый_храмовник, count: 5 }
  reward: { xp: 220, gold: 11000, items: [латы_паладина] }
  requires: dawn_cleanse_relics

dawn_mist_titan:
  name: "Исполин у Врат"
  giver: аббат_рассвета
  turn_in: аббат_рассвета
  desc: >
    Из самой гущи мглы соткался туманный исполин, и пока он стоит у врат,
    свету не пробиться вниз. Аббат Светолий доверяет тебе сразить его.
  objective: { type: kill, mob: туманный_исполин, count: 1 }
  reward: { xp: 320, gold: 20000, items: [амулет_первого_солнца] }
  requires: dawn_fallen_brothers

# ═════════════════════════ ПЕРЕВАЛ СТОНУЩИХ ВЕТРОВ ═════════════════════════
windpass_clear_road:
  name: "Расчистить тропу"
  giver: застрявший_торговец
  turn_in: застрявший_торговец
  desc: >
    Фургон торговца застрял в теснине, а горные хищники не дают и шагу ступить.
    Перебей 5 горных хищников, чтобы расчистить ему путь.
  objective: { type: kill, mob: горный_хищник, count: 5 }
  reward: { xp: 90, gold: 5500, items: [горский_оберег] }

windpass_outlaw_tokens:
  name: "Клейма изгоев"
  giver: застрявший_торговец
  turn_in: застрявший_торговец
  desc: >
    Банда обирает всех на перевале. Торговец просит принести 4 клеймёных
    жетона с горных изгоев — как доказательство для стражи дальних земель.
  objective: { type: collect, item: клеймёный_жетон, count: 4 }
  reward: { xp: 120, gold: 7000, items: [ветрозащитный_плащ] }
  requires: windpass_clear_road

windpass_still_the_dead:
  name: "Упокоить мёртвых перевала"
  giver: горный_отшельник
  turn_in: горный_отшельник
  desc: >
    Отшельник видит, как замёрзшие мертвецы поднимаются на голос ветра.
    Упокой 4 замёрзших мертвецов у заброшенной заставы.
  objective: { type: kill, mob: замёрзший_мертвец, count: 4 }
  reward: { xp: 130, gold: 6000, items: [ледовый_топор] }

windpass_break_outlaws:
  name: "Сразить главаря изгоев"
  giver: горный_отшельник
  turn_in: горный_отшельник
  desc: >
    Пока Грозовой Кьяр сидит на перевале, голоса ветра не утихнут. Срази
    главаря изгоев на вершине прохода.
  objective: { type: kill, mob: главарь_изгоев, count: 1 }
  reward: { xp: 220, gold: 15000, items: [амулет_путника] }
  requires: windpass_still_the_dead

# ═════════════════════════ ЗАТОНУВШИЙ ГОРОД (ФИНАЛ Акта III) ═════════════════════════
deep_drowned_streets:
  name: "Тени затопленных улиц"
  giver: разведчик_крон
  turn_in: разведчик_крон
  desc: >
    Спуск к Глуби открыт, но затопленные улицы кишат утопленниками. Крон
    просит расчистить путь — упокой 6 глубинных утопленников.
  objective: { type: kill, mob: глубинный_утопленник, count: 6 }
  reward: { xp: 700, gold: 32000, items: [риза_утопшего] }
  requires: ash_scout_abyss

deep_salt_of_abyss:
  name: "Соль мёртвых богов"
  giver: разведчик_крон
  turn_in: разведчик_крон
  desc: >
    Чтобы выковать оружие против Источника, нужна соль Глуби, что носят её
    жрецы. Добудь 4 кристалла соли Глуби с жрецов на площади и в храме.
  objective: { type: collect, item: соль_глуби, count: 4 }
  reward: { xp: 800, gold: 36000, items: [посох_бездны] }
  requires: deep_drowned_streets

deep_high_priest:
  name: "Молчание храма"
  giver: разведчик_крон
  turn_in: разведчик_крон
  desc: >
    В храме Утонувших Богов верховный жрец Глуби поёт хвалу Источнику. Оборви
    его песнь — срази верховного жреца Глуби у чёрного алтаря.
  objective: { type: kill, mob: верховный_жрец_глуби, count: 1 }
  reward: { xp: 1000, gold: 50000, items: [латы_левиафана] }
  requires: deep_salt_of_abyss

deep_source_slayer:
  name: "Угасить Источник"
  giver: разведчик_крон
  turn_in: разведчик_крон
  desc: >
    Конец пути. На дне бездны бьётся Сердце Глуби — Источник, что веками дышит
    туманом на мир. Сокруши воплощение Голоса Глубин, и туман уйдёт навсегда.
  objective: { type: kill, mob: сердце_глуби, count: 1 }
  reward: { xp: 2000, gold: 300000, items: [око_глуби] }
  requires: deep_high_priest


dwarf_drift_cleanse:
  name: "Тишина в штреке"
  giver: штейгер_заставы
  turn_in: штейгер_заставы
  desc: >
    Старый штрек кишит крысами, и рудокопы боятся туда соваться. Штейгер
    просит расчистить его — перебей 5 рудничных крыс в боковых штольнях.
  objective: { type: kill, mob: рудничная_крыса, count: 5 }
  reward: { xp: 60, gold: 4000, items: [рудничный_перстень] }

elf_thornward_cull:
  name: "Дозор Лунного Предела"
  giver: elf_warden
  turn_in: elf_warden
  desc: >
    Порченые твари наглеют у самых стен анклава. Страж рощи просит проредить
    их: убей 5 порченых лисов на Стрелковой тропе и в подлеске.
  objective: { type: kill, mob: порченый_лис, count: 5 }
  reward: { xp: 90, gold: 4500, items: [талисман_меткости] }

orc_first_blood:
  name: "Первая кровь"
  giver: orc_warband_caller
  turn_in: orc_warband_caller
  desc: >
    Племя мерит чужаков делом. Болотные кабаны лезут к самому валу — пойди в
    Двор Испытаний и докажи клык: убей 5 болотных кабанов.
  objective: { type: kill, mob: болотный_кабан, count: 5 }
  reward: { xp: 60, gold: 3500, items: [тяжёлый_тесак] }

goblin_warren_cull:
  name: "Очистить лазы"
  giver: главарь_норы
  turn_in: главарь_норы
  desc: >
    Крысы и паучьё грызут запасы Норы. Главарь велит проредить их — перебей
    5 туннельных крыс в боковых лазах.
  objective: { type: kill, mob: туннельная_крыса, count: 5 }
  reward: { xp: 60, gold: 3500, items: [кривой_тесак] }

# ─── стартовый квест столицы (наставник) ───
посвящение_новичка:
  name: "Посвящение новичка"
  giver: наставник
  turn_in: наставник
  desc: |
    Спустись в старый подвал под площадью (вход «вниз») и одолей тварей, что там
    завелись. С них падёт Знак посвящения — принеси его мне, и я признаю тебя
    готовым к настоящим странствиям.
  objective: {type: collect, item: знак_посвящения, count: 1}
  reward: {xp: 60, gold: 2000, items: [малое_зелье]}

# ── тестовые образцы новых типов целей (этап 5.1; контент-цепочки — этап 5.2) ──
# Мини-квесты у существующих NPC деревни. Награды скромные (порядок ежедневки).
# Демонстрируют talk / reach / use / choose и поле on_complete (последствия).

sample_talk_elder:
  name: "Весть жрецу"
  giver: старейшина
  turn_in: старейшина
  desc: >
    Старейшина Хальдер просит передать весть брату Келю. Ступай на запад,
    в Святилище Рассвета, и поговори со жрецом.
  objective: { type: talk, npc: жрец_храма }
  reward: { xp: 40, gold: 1500 }

sample_reach_well:
  name: "На дно колодца"
  giver: старейшина
  turn_in: старейшина
  desc: >
    Из старого колодца тянет холодом подземелий. Старейшина просит спуститься
    (вниз с площади) на самое дно и осмотреться.
  objective: { type: reach, room: well }
  reward: { xp: 40, gold: 1500 }

sample_use_potion:
  name: "Проба зелья"
  giver: жрец_храма
  turn_in: жрец_храма
  desc: >
    Брат Кель хочет убедиться, что ты умеешь врачевать себя в бою. Испробуй
    малое зелье лечения — просто выпей его.
  objective: { type: use, item: малое_зелье }
  reward: { xp: 40, gold: 1500 }

sample_choose_faith:
  name: "Развилка веры"
  giver: жрец_храма
  turn_in: жрец_храма
  desc: >
    Брат Кель спрашивает, чему ты вверишь свой путь: свету Рассвета или тихому
    равновесию Круга. Выбор изменит, как мир запомнит тебя.
  objective:
    type: choose
    options:
      - id: light
        label: "Путь Света"
        text: "Ты клянёшься нести свет Рассвета против тумана."
      - id: balance
        label: "Путь Равновесия"
        text: "Ты выбираешь тихий путь равновесия, не гася и не раздувая пламя."
  reward: { xp: 50, gold: 2000 }
  on_complete:
    flags: { sample_faith: chosen }
    reputation: { orden_rassveta: 100 }
    chronicle: "{name} сделал(а) выбор на развилке веры в Туманном Броде."

# ═══════════════════════════════════════════════════════════════════════
#  ВЕРТИКАЛЬ «ТАЙНА КОЛОДЦА» (этап 5.2) — ур. ~4–9, старт у наставника
#  Цепочка из 8 связанных квестов (requires), задействует ВСЕ типы целей:
#    talk → reach → talk → kill → collect → use → choose → kill (мини-босс).
#  Финал раздваивается на взаимоисключающие обряды (exclusive_group
#  "crypt_rite"): огонь (pyre) или бдение (vigil) — с разными репутациями,
#  флагом crypt_rite и реакцией Брата Келя (npcs.yaml). Мини-босс —
#  тёмный_рыцарь (ур.8) у Врат Руин, куда ведёт спуск из колодца.
# ═══════════════════════════════════════════════════════════════════════
crypt_omen:
  name: "Холод из колодца"
  giver: наставник
  turn_in: наставник
  desc: >
    «Из старого колодца по ночам тянет трупным холодом, а вода почернела,» —
    хмурится Альдрик. «Ступай к Брату Келю в святилище: жрец Ордена ведает,
    отчего мертвецы под деревней потеряли покой.»
  objective: { type: talk, npc: жрец_храма }
  reward: { xp: 45, gold: 2500, items: [малое_зелье] }

crypt_descent:
  name: "Спуск во тьму"
  giver: наставник
  turn_in: наставник
  desc: >
    Брат Кель говорит: беда идёт снизу, из катакомб под колодцем. Спустись в
    колодец (вниз с площади), протиснься через сырой пролом на север — в
    Катакомбы — и погляди своими глазами, что тревожит древних мёртвых.
  objective: { type: reach, room: catacombs }
  requires: crypt_omen
  reward: { xp: 55, gold: 3000 }

crypt_elder_lore:
  name: "Память старейшины"
  giver: наставник
  turn_in: наставник
  desc: >
    Ты видел, как черепа в нишах поворачиваются вслед шагам. Старейшина Хальдер
    помнит мир до тумана — расспроси его, кого хоронили в этих катакомбах и
    почему их сон оборвался.
  objective: { type: talk, npc: старейшина }
  requires: crypt_descent
  reward: { xp: 70, gold: 3500 }

crypt_restless_dead:
  name: "Неупокоенные"
  giver: наставник
  turn_in: наставник
  desc: >
    Хальдер помнит: в этих нишах спали дозорные старого Брода, а туман поднял их
    на ноги. Упокой пятерых древних скелетов, чтобы поредела нежить и стало
    безопаснее спуститься глубже.
  objective: { type: kill, mob: скелет, count: 5 }
  requires: crypt_elder_lore
  reward: { xp: 100, gold: 5000, items: [эликсир] }

crypt_gather_ectoplasm:
  name: "Дым для мёртвых"
  giver: жрец_храма
  turn_in: жрец_храма
  desc: >
    «Чтобы уложить эхо, а не рубить его без конца, нужен освящённый ладан,» —
    говорит Брат Кель. «Но освятить его можно лишь на эктоплазме самих призраков.
    Собери три склянки с неупокоенных в катакомбах — и я приготовлю курильницу.»
  objective: { type: collect, item: эктоплазма, count: 3 }
  requires: crypt_restless_dead
  reward: { xp: 120, gold: 5500, items: [погребальный_ладан] }

crypt_ward:
  name: "Обряд покоя"
  giver: жрец_храма
  turn_in: жрец_храма
  desc: >
    Курильница готова. Спустись к оскверненным нишам катакомб и воскури
    погребальный ладан — его дым отгонит эхо и на время усмирит мёртвых, открыв
    дорогу к тому, что держит их в плену.
  objective: { type: use, item: погребальный_ладан }
  requires: crypt_gather_ectoplasm
  reward: { xp: 110, gold: 6000, items: [большое_зелье] }

crypt_choice:
  name: "Приговор колодцу"
  giver: наставник
  turn_in: наставник
  desc: >
    Дым развеял морок, и ты понял: мёртвых удерживает древний обряд, вросший в
    камень. Развязать его можно двояко. Реши, как упокоить катакомбы навсегда —
    и Альдрик впишет твой выбор в память Брода.
  objective:
    type: choose
    options:
      - id: pyre
        label: "🔥 Предать огню"
        text: >
          Ты решаешь выжечь оскверненные ниши дотла, как велит Орден: прах к
          праху, чтобы эхо не за что было цепляться.
      - id: vigil
        label: "🕊 Упокоить бдением"
        text: >
          Ты решаешь не тревожить прах огнём, а увести мёртвых миром — тихим
          бдением, как учит Круг: пусть уснут, не потревоженные.
  requires: crypt_ward
  reward: { xp: 130, gold: 6500 }
  on_complete:
    chronicle: "{name} вынес(ла) приговор мёртвым Колодца."

crypt_pyre_rite:
  name: "Прах к праху"
  giver: наставник
  turn_in: наставник
  desc: >
    Путь огня. У Врат Руин, куда сходятся катакомбы, обряд стережёт Тёмный
    рыцарь — древний страж мёртвых. Срази его и предай оскверненные ниши святому
    пламени, чтобы эхо не поднялось вновь.
  objective: { type: kill, mob: тёмный_рыцарь, count: 1 }
  requires: crypt_choice
  exclusive_group: "crypt_rite"
  reward: { xp: 190, gold: 12000, items: [реликварий_зари] }
  on_complete:
    flags: { crypt_rite: pyre }
    reputation: { orden_rassveta: 12, koven_gnilotopi: -5 }
    chronicle: "{name} выжег(ла) катакомбы Колодца святым огнём — прах к праху."

crypt_vigil_rite:
  name: "Тихое бдение"
  giver: наставник
  turn_in: наставник
  desc: >
    Путь бдения. У Врат Руин обряд стережёт Тёмный рыцарь, что не даёт мёртвым
    уснуть. Срази его и заверши бдение над нишами — без огня, чтобы прах остался
    нетронутым, а эхо угасло само.
  objective: { type: kill, mob: тёмный_рыцарь, count: 1 }
  requires: crypt_choice
  exclusive_group: "crypt_rite"
  reward: { xp: 190, gold: 12000, items: [древний_амулет] }
  on_complete:
    flags: { crypt_rite: vigil }
    reputation: { shepchuschiy_krug: 12, orden_rassveta: -5 }
    chronicle: "{name} упокоил(а) катакомбы Колодца тихим бдением, не потревожив прах."
