# ─────────────────────────────────────────────────────────────
#  ЭТАЛОННАЯ РАСОВАЯ СТОЛИЦА — Человек, «Туманный Брод»
#  Этот файл мержится в WORLD поверх world.yaml (переопределяет village/temple/well).
#  Формат для тиражирования на другие расы: world_capital_<race>.yaml
#  Флаги комнат: safe (город, без агро/PvP), rest (отдых), bank, arena,
#  inn, personal, teleport, respawn.
# ─────────────────────────────────────────────────────────────

village:
  name: "Площадь Туманного Брода"
  zone: "Туманный Брод"
  desc: |
    Сердце города. Брусчатка чисто выметена, над колодцем поют водоносы, у
    столба с указателями греется на солнце рыжий кот. На каменном постаменте —
    старый Телепортный Камень, мягко мерцающий синим. Отсюда расходятся улицы во
    все стороны, а под площадью темнеет вход в старый подвал.
  exits: {север: market, восток: trainers_hall, юг: temple, запад: fountain, вниз: cellar}
  npc: [наставник, старейшина, стражник]
  safe: true
  respawn: true
  teleport: true

market:
  name: "Торговый ряд"
  zone: "Туманный Брод"
  desc: |
    Пёстрые навесы, запах свежего хлеба и горячего металла. Лавочник зазывает к
    прилавку с зельями и припасами, а у наковальни звенит молот оружейника.
  exits: {юг: village, север: north_gate, восток: bank, запад: craft_guild}
  npc: [лавочник_туманного_брода, оружейник_брода]
  safe: true

north_gate:
  name: "Северные ворота"
  zone: "Туманный Брод"
  desc: |
    Высокая арка ворот, окованная железом. Стражник в начищенной кольчуге кивает
    проходящим. За воротами начинается тропа в Шепчущий лес.
  exits: {юг: market, север: forest_edge}
  npc: [стражник]
  safe: true

bank:
  name: "Купеческий банк"
  zone: "Туманный Брод"
  desc: |
    Прохладный зал с тяжёлыми сундуками за решёткой. За конторкой банкир считает
    монеты и принимает вклады на хранение. Здесь же меняют звёзды на золото.
  exits: {запад: market, восток: east_gate}
  npc: [банкир]
  safe: true
  bank: true

east_gate:
  name: "Восточные ворота"
  zone: "Туманный Брод"
  desc: |
    Ворота, обращённые к холмам и старым рудникам. Колея разбита тележными
    колёсами. Стражник опирается на алебарду.
  exits: {запад: bank, восток: mine_entrance}
  npc: [стражник]
  safe: true

craft_guild:
  name: "Дом ремёсел"
  zone: "Туманный Брод"
  desc: |
    Просторный двор гильдий. Пахнет травами, опилками и угольным жаром. У столов
    собрались главы гильдий — кузнечной, алхимической и добывающей; они охотно
    учат ремеслу и скупают сырьё.
  exits: {восток: market}
  npc: [глава_кузнецов, глава_алхимиков, глава_добытчиков]
  safe: true

trainers_hall:
  name: "Дом наставников"
  zone: "Туманный Брод"
  desc: |
    Учебный зал с чучелами для отработки ударов и стойками с оружием. Наставник
    боя показывает новичкам приёмы и обучает умениям по мере их роста.
  exits: {запад: village, восток: arena}
  npc: [наставник_боя]
  safe: true

arena:
  name: "Арена Туманного Брода"
  zone: "Туманный Брод"
  desc: |
    Круглая песчаная площадка, обнесённая трибунами. Здесь бойцы меряются силой
    по правилам — без позора и кровной метки. Распорядитель арены ведёт записи на дуэли.
  exits: {запад: trainers_hall}
  npc: [мастер_арены]
  safe: true
  arena: true

fountain:
  name: "Площадь Фонтана"
  zone: "Туманный Брод"
  desc: |
    Светлая площадь с журчащим фонтаном. На бортиках воркуют голуби, дети бросают
    им крошки. Тихий, мирный уголок.
  exits: {восток: village, юг: back_alley}
  spawns: [городской_голубь, городской_голубь]
  safe: true

back_alley:
  name: "Закоулок"
  zone: "Туманный Брод"
  desc: |
    Узкий переулок между домами. Пахнет сыростью и кухонным чадом. У помойных
    бочек крутится тощий бродячий пёс.
  exits: {север: fountain}
  spawns: [городской_пёс]
  safe: true

temple:
  name: "Святилище Рассвета"
  zone: "Туманный Брод"
  desc: |
    Светлый каменный храм, куда не дотягивается туман. У алтаря молится седой
    жрец. Здесь можно отдохнуть и исцелиться телом и духом.
  exits: {север: village, восток: inn, запад: harbor_gate, юг: south_gate}
  npc: [жрец_храма]
  safe: true
  rest: true
  respawn: true

inn:
  name: "Гостиница «Туманный очаг»"
  zone: "Туманный Брод"
  desc: |
    Тёплый общий зал, в очаге трещит огонь, пахнет похлёбкой. Трактирщик протирает
    кружки и сдаёт усталым странникам комнаты наверху.
  exits: {запад: temple, вверх: inn_room}
  npc: [трактирщик_очага]
  safe: true
  rest: true

inn_room:
  name: "Личная комната"
  zone: "Туманный Брод"
  desc: |
    Уютная комнатка под крышей: застеленная кровать, окно во двор и крепкий
    личный сундук у стены. Здесь можно выспаться и восстановить силы.
  exits: {вниз: inn}
  safe: true
  rest: true
  personal: true

south_gate:
  name: "Южные ворота"
  zone: "Туманный Брод"
  desc: |
    Ворота к топям. Воздух влажный, тянет тиной. Стражник советует новичкам не
    соваться на болото в одиночку.
  exits: {север: temple, юг: swamp_road}
  npc: [стражник]
  safe: true

cellar:
  name: "Старый подвал"
  zone: "Туманный Брод"
  desc: |
    Пыльный подвал под площадью. С потолка свисает паутина, в углах шуршит. Сюда
    наставник посылает новичков на первое испытание. Ход ведёт глубже на север.
  exits: {вверх: village, север: cellar_deep}
  spawns: [подвальная_крыса]

cellar_deep:
  name: "Глубокий подвал"
  zone: "Туманный Брод"
  desc: |
    Дальняя часть подвала, где сырость и темнота сгущаются. В трещине стены
    зияет лаз вниз — в настоящие подземелья под городом.
  exits: {юг: cellar, вниз: well}
  spawns: [подвальный_паук]

well:
  name: "Дно колодца"
  zone: "Подземелья"
  desc: |
    Дно старого колодца. Сыро, темно, пахнет плесенью. В стене — проломы, из
    которых тянет холодом катакомб и гоблинских нор.
  exits: {вверх: cellar_deep, север: catacombs, восток: goblin_warren}
  spawns: [крыса, летучая_мышь]
