# Питомцы и маунты с прогрессией. Питомцы растут за убийства и дают бонусы.
pets:
  wolf_pup:
    name: "Волчонок"
    emoji: "🐺"
    cost: 30000
    atk_per_level: 2        # +атаки владельцу за уровень питомца
    crit_at: 5              # с этого уровня +крит
    crit_bonus: 0.05
    desc: "Верный волчонок. Растёт в свирепого спутника."
  baby_drake:
    name: "Дракончик"
    emoji: "🐉"
    cost: 150000
    atk_per_level: 3
    crit_at: 8
    crit_bonus: 0.08
    desc: "Малыш-дракон. Дорогой, но грозный в бою."
  spirit_owl:
    name: "Дух-сова"
    emoji: "🦉"
    cost: 60000
    atk_per_level: 1
    crit_at: 4
    crit_bonus: 0.04
    desc: "Мудрый дух. Скромная атака, ранний крит-бонус."
mounts:
  swift_horse:
    name: "Скакун"
    emoji: "🐎"
    cost: 80000
    gold_bonus: 0.05       # +5% к добыче золота
    desc: "Быстрый конь — больше вылазок, больше добычи."
  war_ram:
    name: "Боевой баран"
    emoji: "🐏"
    cost: 120000
    gold_bonus: 0.08
    desc: "Крепкий ездовой баран сурового севера."
