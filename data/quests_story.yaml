# =====================================================================
#  СЮЖЕТНЫЕ КВЕСТЫ «СЕМЬ КОРОН»  (см. docs/STORY.md, docs/QUEST_DESIGN.md)
#  Схема как в quests.yaml: giver/turn_in/desc/objective/requires/reward.
#  objective: kill (mob) | collect (item). Цепочки — через requires.
#  Все id NPC/мобов/предметов сверены с npcs.yaml / mobs.yaml / items.yaml.
# =====================================================================

# ─────────────────── МЕЙН-ЛИНИЯ (сквозь акты) ───────────────────
main_arrival:
  name: "Странник у ворот"
  giver: старейшина
  turn_in: старейшина
  desc: >
    Хальдер встречает наёмника без имени и судьбы. «Хочешь, чтобы Брод тебя
    запомнил, — начни с малого. Волки осмелели у самой околицы. Проредь стаю.»
  objective: { type: kill, mob: волк, count: 4 }
  reward: { xp: 50, gold: 3500, items: [малое_зелье] }

main_three_paths:
  name: "Три тропы к Руинам"
  giver: старейшина
  turn_in: старейшина
  desc: >
    «Туман — дыхание Падшего Короля, и три пути ведут к его руинам: лес, рудники,
    болото.» Хальдер шлёт тебя на северную тропу — оборвать паучье гнездо в чаще,
    что травит лес.
  objective: { type: kill, mob: гигантский_паук, count: 1 }
  requires: main_arrival
  reward: { xp: 90, gold: 5000, items: [эликсир] }

main_anchor_truth:
  name: "Якорь тумана"
  giver: старейшина
  turn_in: старейшина
  desc: >
    У древних врат тебя ждёт тёмный рыцарь — страж того, что держит туман.
    Срази его и сам увидишь: Король не источник мглы, а гвоздь, которым она
    прибита к миру. Принеси Хальдеру весть.
  objective: { type: kill, mob: тёмный_рыцарь, count: 1 }
  requires: main_three_paths
  reward: { xp: 160, gold: 9000, items: [амулет_силы] }

main_call_of_deep:
  name: "Зов из-под Руин"
  giver: старейшина
  turn_in: разведчик_крон
  desc: >
    Король пал, но из раны полезло Воинство. «Туман не побеждён — лишь ранен,»
    — говорит Хальдер. Иди за Руины, на Пепельные Пустоши, и расчисти путь
    к разведчику Крону: он знает дорогу к Глуби.
  objective: { type: kill, mob: пепельная_тварь, count: 6 }
  requires: main_anchor_truth
  reward: { xp: 320, gold: 16000, items: [саван_скитальца] }

# ─────────────────── ФРАКЦИЯ: ВОЛЬНЫЕ РУДОКОПЫ ───────────────────
forge_first_ore:
  name: "Первая жила"
  giver: гильдейский_кузнец
  turn_in: гильдейский_кузнец
  desc: >
    Освальд меряет чужаков делом, а не словом. «Из руды тумана выходит злая
    кромка. Притащи четыре куска — и поговорим как мастеровые.»
  objective: { type: collect, item: руда_тумана, count: 4 }
  reward: { xp: 110, gold: 6000, items: [острожный_клинок] }

forge_mad_stope:
  name: "Безумие штолен"
  giver: мастер_гильдии
  turn_in: мастер_гильдии
  desc: >
    Брунгильда не льёт слёз: «Мои люди встают мертвецами у собственных кирок.
    Упокой тех, кого мгла уже забрала, — четверых туманных рудокопов. Плачу
    не скупясь.»
  objective: { type: kill, mob: туманный_рудокоп, count: 4 }
  requires: forge_first_ore
  reward: { xp: 150, gold: 8000, items: [рудокопский_оберег] }

forge_storm_core:
  name: "Буря в железе"
  giver: мастер_гильдии
  turn_in: мастер_гильдии
  desc: >
    «На окраине из мглы соткался буревестник — буря, обретшая плоть. Свали его,
    чужак, и Острог запомнит твоё имя.» Сердце бури Брунгильда выкует в амулет.
  objective: { type: kill, mob: острожный_буревестник, count: 1 }
  requires: forge_mad_stope
  reward: { xp: 230, gold: 15000, items: [амулет_бури] }

# ─────────────────── ФРАКЦИЯ: ОРДЕН РАССВЕТА ───────────────────
dawn_oath:
  name: "Клятва у света"
  giver: паладин_наставник
  turn_in: паладин_наставник
  desc: >
    «Молитва молитвой, а руку ставит выпад,» — встречает Гэвейн. Упыри лезут к
    вратам обители каждую ночь. Упокой шестерых на серпантине — и докажи, что
    не дрогнешь во мгле.
  objective: { type: kill, mob: восходный_упырь, count: 6 }
  reward: { xp: 150, gold: 7000, items: [освящённый_клинок] }

dawn_holy_steel:
  name: "Свет в металле"
  giver: жрец_реликвария
  turn_in: жрец_реликвария
  desc: >
    Брат Аврелий скорбит о святынях, что мгла осквернила. «Образки наших павших
    почернели в тумане — собери четыре с подступов, и мы вернём им чистоту, а
    тебе — реликварий зари.»
  objective: { type: collect, item: осквернённый_образок, count: 4 }
  requires: dawn_oath
  reward: { xp: 175, gold: 8500, items: [реликварий_зари] }

dawn_purge_choice:
  name: "Огонь над приделом"
  giver: аббат_рассвета
  turn_in: аббат_рассвета
  desc: >
    «Тьму не уговаривают, чужак.» Светолий велит выжечь придел, где поднялись
    осквернённые храмовники, — даровать покой пятерым павшим братьям святым
    огнём. Тяжелее всего поднять клинок на своих.
  objective: { type: kill, mob: осквернённый_храмовник, count: 5 }
  requires: dawn_holy_steel
  reward: { xp: 230, gold: 12000, items: [латы_паладина] }

# ─────────────────── ФРАКЦИЯ: ШЕПЧУЩИЙ КРУГ ───────────────────
moon_watch:
  name: "Дозор у анклава"
  giver: elf_warden
  turn_in: elf_warden
  desc: >
    Страж Таэрон чует порчу тумана нутром. «Мгла сводит зверьё с ума. Проредишь
    порченых лисов у Стрелковой тропы — роща отблагодарит.»
  objective: { type: kill, mob: порченый_лис, count: 5 }
  reward: { xp: 90, gold: 4500, items: [талисман_меткости] }

moon_balance:
  name: "Шёпот равновесия"
  giver: elf_warden
  turn_in: elf_warden
  desc: >
    «Лунный Предел стоит, пока стоит дозор. Но порча идёт глубже зверья —
    из подлеска лезут порченые олени. Упокой троих, не больше: роща не любит,
    когда рубят сплеча.»
  objective: { type: kill, mob: порченый_олень, count: 3 }
  requires: moon_watch
  reward: { xp: 110, gold: 5500, items: [эликсир] }

# ═════════ МОРАЛЬНЫЙ ВЫБОР: ОРДЕН ↔ КОВЕН (взаимоисключающие ветки) ═════════
#  Развязка: choice_prologue → oath_crossroads (choose) →
#            { choice_holy_fire (Орден) | choice_pact_dead (Ковен) } →
#            { dawn_reckoning | koven_covenant } (финалы лочат друг друга).
#  Ветки в exclusive_group "orden_koven": приём одной навсегда лочит другую.
#  Флаг path (orden|koven) ставит on_complete вступительного квеста ветки —
#  на него завязаны reactions орденцев и ковенцев (npcs.yaml).
choice_prologue:
  name: "Осквернённый алтарь"
  giver: болотная_знахарка
  turn_in: болотная_знахарка
  desc: >
    «Скверна растёт,» — хрипит Сольвейг. Утопленники не дают покоя топи, и алтарь
    осквернён. Упокой троих утопленников — а после реши, чьей дорогой очищать
    алтарь: миром Ковена или огнём Ордена.
  objective: { type: kill, mob: утопленник, count: 3 }
  reward: { xp: 100, gold: 5500, items: [большое_зелье] }

oath_crossroads:
  name: "Распутье клятвы"
  giver: болотная_знахарка
  turn_in: болотная_знахарка
  desc: >
    Алтарь чист, но покой топи хрупок. «Дальше — не моя тропа выбирать за тебя,
    дитя,» — Сольвейг глядит в упор. Орден Рассвета сулит выжечь мглу дотла;
    Ковен Гнилотопи — договориться с мёртвыми и увести их миром. Служить обоим
    нельзя: свет и договор непримиримы. Выбери, чью клятву принесёшь.
  objective:
    type: choose
    options:
      - id: orden
        label: "⚜️ Путь Ордена Рассвета"
        text: >
          Ты клянёшься нести свет Рассвета и выжигать туман без пощады.
          Ступай к Наставнику Гэвейну — он примет твой обет огнём.
      - id: koven
        label: "🧪 Путь Ковена Гнилотопи"
        text: >
          Ты клянёшься говорить с мёртвыми, а не жечь их. Останься у Сольвейг —
          Ковен научит тебя укладывать павших миром.
  requires: choice_prologue
  reward: { xp: 120, gold: 6000, items: [большое_зелье] }
  on_complete:
    chronicle: "{name} встал(а) на распутье клятвы: свет Ордена или договор Ковена."

choice_holy_fire:
  name: "Святой огонь над топью"
  giver: паладин_наставник
  turn_in: паладин_наставник
  desc: >
    Путь Ордена. «Туман есть тьма, а тьму выжигают,» — Гэвейн даёт тебе освящённый
    елей. Тех, кого топь обратила в осквернённых храмовников, нельзя оставить так —
    предай огню четверых. С этого обета Ковен для тебя закрыт.
  objective: { type: kill, mob: осквернённый_храмовник, count: 4 }
  requires: oath_crossroads
  exclusive_group: "orden_koven"
  reward: { xp: 180, gold: 9000, items: [большое_зелье] }
  on_complete:
    flags: { path: orden }
    reputation: { orden_rassveta: 15, koven_gnilotopi: -10 }
    chronicle: "{name} принёс(ла) клятву Ордену Рассвета — свет выжжет туман дотла."

choice_pact_dead:
  name: "Договор с мёртвыми"
  giver: болотная_знахарка
  turn_in: болотная_знахарка
  desc: >
    Путь Ковена. «Не всякий мертвец — враг, дитя. Принеси болотный цветок с самого
    сердца топи — на нём я заключу с павшими договор, и они уснут сами, без огня
    и без крови.» С этого обета Орден для тебя закрыт.
  objective: { type: collect, item: болотный_цветок, count: 2 }
  requires: oath_crossroads
  exclusive_group: "orden_koven"
  reward: { xp: 180, gold: 9000, items: [большое_зелье] }
  on_complete:
    flags: { path: koven }
    reputation: { koven_gnilotopi: 15, orden_rassveta: -10 }
    chronicle: "{name} принёс(ла) клятву Ковену Гнилотопи — договор с мёртвыми превыше огня."

dawn_reckoning:
  name: "Приговор Рассвета"
  giver: паладин_наставник
  turn_in: паладин_наставник
  desc: >
    Финал пути Ордена. «Полумеры туман не берут,» — Гэвейн ведёт тебя к самому
    осквернённому приделу топи. Заверши обет: предай святому огню пятерых
    осквернённых храмовников, и Рассвет впишет твоё имя в свои молитвы.
  objective: { type: kill, mob: осквернённый_храмовник, count: 5 }
  requires: choice_holy_fire
  locks: [koven_covenant]
  reward: { xp: 260, gold: 14000, items: [освящённый_клинок] }
  on_complete:
    reputation: { orden_rassveta: 20, koven_gnilotopi: -15 }
    chronicle: "{name} довершил(а) путь Ордена — топь очищена огнём Рассвета."

koven_covenant:
  name: "Печать договора"
  giver: болотная_знахарка
  turn_in: болотная_знахарка
  desc: >
    Финал пути Ковена. «Договор скрепляют не кровью, а покоем,» — Сольвейг учит
    тебя словам, что укладывают мёртвых. Упокой миром шестерых утопленников: пусть
    уснут по доброй воле, и топь примет тебя как своего.
  objective: { type: kill, mob: утопленник, count: 6 }
  requires: choice_pact_dead
  locks: [dawn_reckoning]
  reward: { xp: 260, gold: 14000, items: [проклятый_клинок] }
  on_complete:
    reputation: { koven_gnilotopi: 20, orden_rassveta: -15 }
    chronicle: "{name} скрепил(а) договор Ковена — мёртвые топи уснули миром."

# ═════ МОСТ 17–40: цепочка «Голоса Глубин» (ведёт к Сердцу Бездны) ═════
bridge_ash:
  name: "Тени в пепле"
  giver: голос_глубин
  turn_in: голос_глубин
  min_level: 18
  desc: >
    🌀 «Ты перерос ораву у околиц, эхо. Но Туман тянется дальше — в Пепельные
    Пустоши, где мои ревенанты встают из золы. Ступай к Провалу Затонувшего и
    угаси шестерых. Докажи, что достоин глубин.»
  objective: { type: kill, mob: пепельный_ревенант, count: 6 }
  reward: { xp: 600, gold: 12000, items: [эликсир] }
bridge_frost:
  name: "Воеводы стужи"
  giver: голос_глубин
  turn_in: голос_глубин
  min_level: 22
  desc: >
    🌀 «На Перевале Стонущих Ветров стужа обрела волю и вождей. Морозные воеводы
    гонят живых прочь от спуска в дальние земли. Сломай шестерых — и дорога вниз
    откроется тебе.»
  objective: { type: kill, mob: морозный_воевода, count: 6 }
  requires: bridge_ash
  reward: { xp: 900, gold: 16000, items: [большое_зелье] }
bridge_bone:
  name: "Легаты из костей"
  giver: голос_глубин
  turn_in: голос_глубин
  min_level: 26
  desc: >
    🌀 «Затопленные улицы Города полнятся костяными легатами — офицерами
    мёртвого воинства. Раздроби шестерых, пока они не сомкнули строй, эхо.»
  objective: { type: kill, mob: костяной_легат, count: 6 }
  requires: bridge_frost
  reward: { xp: 1300, gold: 20000, items: [амулет_силы] }
bridge_nightmare:
  name: "Кошмары глубин"
  giver: голос_глубин
  turn_in: голос_глубин
  min_level: 30
  desc: >
    🌀 «Чем ближе к ране мира, тем гуще мои сны наяву. Глубинные кошмары ткут
    ужас в затопленных кварталах. Развей шестерых — и загляни глубже.»
  objective: { type: kill, mob: глубинный_кошмар, count: 6 }
  requires: bridge_bone
  reward: { xp: 1800, gold: 26000, items: [большое_зелье, эликсир] }
bridge_rift:
  name: "У края разлома"
  giver: голос_глубин
  turn_in: голос_глубин
  min_level: 34
  desc: >
    🌀 «Бездна Глуби дышит, и из разлома лезут твари, которым нет имени. Убей
    шестерых у самого края — там, где я жду тебя своим последним воплощением.»
  objective: { type: kill, mob: тварь_разлома, count: 6 }
  requires: bridge_nightmare
  reward: { xp: 2500, gold: 34000, items: [осколок_первотумана] }
bridge_reaper:
  name: "Жнецы Первотумана"
  giver: голос_глубин
  turn_in: голос_глубин
  min_level: 38
  desc: >
    🌀 «Ты дошёл до порога, эхо. Первотуманные жнецы — привратники Бездны;
    сокруши пятерых, и врата Сердца Бездны примут тебя. Дальше — только тьма и
    Хранитель у её ворот. Спускайся. Утони.»
  objective: { type: kill, mob: первотуманный_жнец, count: 5 }
  requires: bridge_rift
  reward: { xp: 3400, gold: 44000, items: [осколок_первотумана, большое_зелье] }
