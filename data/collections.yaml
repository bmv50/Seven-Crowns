# =====================================================================
#  КОЛЛЕКЦИИ БЕСТИАРИЯ
#  Набор видов мобов (mobs.yaml), которых нужно истребить хотя бы по разу
#  каждого. Прогресс считается по ch.flags["bestiary"] (engine/bestiary.py).
#  При первом полном сборе — разовая награда (gold/items) и, опционально,
#  титул (добавляется в ch.flags["extra_titles"], доступен в выборе титула
#  наравне с титулами достижений).
#  Формат: col_x: {name, mobs: [mob_id...], reward: {gold, items}, title?}
# =====================================================================

col_forest:
  name: "Звери леса"
  mobs: [крыса, волк, лесной_дух, гигантский_паук, летучая_мышь, вожак_стаи]
  reward:
    gold: 5000

col_mines:
  name: "Ужасы штолен"
  mobs: [острожный_кобольд, туманный_рудокоп, штольный_призрак, кристальный_бур, острожный_буревестник]
  reward:
    gold: 8000
    items: [туманный_кристалл]

col_swamp:
  name: "Твари болот"
  mobs: [болотная_тварь, утопленник, болотный_кабан, трясинная_пиявка, клыкастый_секач, степной_падальщик]
  reward:
    gold: 6500

col_undead:
  name: "Ходячие мертвецы"
  mobs: [скелет, призрак, тёмный_рыцарь, штольный_призрак, туманный_плакальщик, восходный_упырь, глубинный_утопленник]
  reward:
    gold: 15000
    items: [эктоплазма]
  title: "Охотник на нежить"

col_port:
  name: "Гроза порта"
  mobs: [туманная_крыса_трюма, матрос_утопленник, контрабандист_головорез, утопший_боцман, портовый_бродяга]
  reward:
    gold: 10000
    items: [солёный_жемчуг]

col_ashlands:
  name: "Пепел и зола"
  mobs: [пепельная_тварь, пепельный_легионер, туманный_плакальщик, пепельный_страж_провала, пепельный_рыцарь]
  reward:
    gold: 20000
    items: [туманная_эссенция]
  title: "Пепельный истребитель"

col_pass:
  name: "Перевал изгоев"
  mobs: [горный_хищник, горный_изгой, замёрзший_мертвец, дух_ветра, главарь_изгоев]
  reward:
    gold: 14000
    items: [вой_ветра]

col_depths:
  name: "Затонувшие ужасы"
  mobs: [глубинный_утопленник, левиафанов_отпрыск, глубинный_жрец, бездонная_тварь, верховный_жрец_глуби, сердце_глуби]
  reward:
    gold: 35000
    items: [соль_глуби]
  title: "Покоритель Глуби"

col_bosses:
  name: "Гроза боссов"
  mobs: [падший_король, острожный_буревестник, утопший_боцман, туманный_исполин, главарь_изгоев, пепельный_рыцарь, верховный_жрец_глуби, сердце_глуби]
  reward:
    gold: 40000
    items: [осколок_первотумана, эликсир]
  title: "Гроза боссов"

# ═════════════════════════ СЕМЬ КОРОН (этап 5.2) ═════════════════════════
# Мета-коллекция: семь венценосцев павших уделов — по одному знаковому боссу
# на регион/акт. Собрать все семь = «надеть» короны павших королевств.
# Награда крупная (эндгейм-сток) + сердце_бездны (реагент венца_семи_корон,
# см. items.yaml) + титул. desc рендерится на экране «👑 Семь Корон» (журнал).
col_seven_crowns:
  name: "Семь Корон"
  desc: "Собери короны павших — и Венец Семи Корон обретёт смысл."
  mobs: [падший_король, острожный_буревестник, утопший_боцман, туманный_исполин, главарь_изгоев, пепельный_рыцарь, сердце_глуби]
  reward:
    gold: 77000
    items: [сердце_бездны, эликсир_героя]
  title: "Хранитель Семи Корон"
