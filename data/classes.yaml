# =====================================================================
#  КЛАССЫ ПЕРСОНАЖЕЙ
#  Атрибуты: str (Сила), dex (Ловкость), int (Интеллект), spi (Дух)
#  per_level: прирост при каждом повышении уровня
#  skills: активные умения (см. skills.yaml)
# =====================================================================

warrior:
  resource: rage
  name: "Воин"
  emoji: "⚔️"
  desc: "Несокрушимый боец переднего ряда. Много здоровья, тяжёлый урон от Силы, частично игнорирует вражеские удары."
  primary: str            # основной атрибут урона
  base:
    str: 8
    dex: 4
    int: 2
    spi: 3
  base_hp: 70
  base_mp: 10
  per_level:
    hp: 14
    mp: 2
    str: 3
    dex: 1
    int: 0
    spi: 1
  # доля урона, поглощаемая бронёй+телосложением (танк)
  damage_reduction: 0.20
  skills: ["power_strike", "shield_wall", "cleave"]
  # Этап 4.2, витрина классов: карточка выбора класса (bot/ui.py render_classes)
  role: "Танк"
  difficulty: 1
  style: "Простой ближний бой — бей и держи удар щитом."
  newbie_ok: true       # симы naive: 0–2.3 смертей до 6 ур. — прощает ошибки новичка
  pros:
    - "Больше всего HP и брони в игре — прощает ошибки"
    - "Ресурс (ярость) копится от самого боя, не нужно следить за маной"
    - "Понятная тактика: атаковать и держать «Стену щитов»"

mage:
  resource: mana
  name: "Маг"
  emoji: "🔮"
  desc: "Повелитель стихий. Бьёт издалека сокрушительными заклинаниями от Интеллекта, но хрупок и зависит от маны."
  primary: int
  base:
    str: 2
    dex: 4
    int: 9
    spi: 5
  # Этап 4.1, рычаг (г): hp_base 50→55 (+10%) — самый хрупкий кастер, в naive без
  # Огненного шара не вывозит +2-мобов на 7–9 ур. (за окном щита). См. docs/BALANCE_ONBOARDING.md.
  base_hp: 55
  base_mp: 50
  per_level:
    hp: 10
    mp: 12
    str: 0
    dex: 1
    int: 3
    spi: 2
  damage_reduction: 0.0
  skills: ["fireball", "frost_armor", "arcane_burst"]
  role: "Урон"
  difficulty: 3
  style: "Дальний бой заклинаниями — огромный урон, но очень хрупок."
  newbie_ok: false      # симы naive: без активного каста не вывозит +2-мобов на 7–9 ур.
  pros:
    - "Самый высокий урон по одиночной цели на дистанции"
    - "«Ледяная броня» гасит опасные удары заранее"
    - "«Чародейский залп» задевает нескольких врагов разом"
  resource_note: "⚠️ Мана тает быстро — не спамьте «Огненный шар» без разбора."

rogue:
  resource: energy
  name: "Разбойник"
  emoji: "🗡"
  desc: "Стремительный убийца. Урон от Ловкости, высокий шанс крита и шанс ударить дважды за ход."
  primary: dex
  base:
    str: 5
    dex: 9
    int: 3
    spi: 3
  base_hp: 54
  base_mp: 20
  per_level:
    hp: 11
    mp: 4
    str: 1
    dex: 3
    int: 1
    spi: 1
  damage_reduction: 0.05
  # повышенный базовый крит и шанс двойного удара
  crit_bonus: 0.15
  double_strike: 0.25
  skills: ["backstab", "evasion", "poison_blade"]
  role: "Урон"
  difficulty: 1
  style: "Быстрый бой ножами — высокий крит и двойные удары."
  newbie_ok: true        # симы naive: 0–2.3 смертей до 6 ур. — простой и живучий старт
  pros:
    - "Повышенный шанс крита и двойного удара — быстрый прогресс"
    - "«Уклонение» снижает входящий урон без лишних кнопок"
    - "Энергия восстанавливается сама, почти не нужно ей управлять"

priest:
  resource: mana
  name: "Жрец"
  emoji: "✨"
  desc: "Светоч жизни. Лечит себя и союзников в одной комнате, накладывает благословения. Урон от Духа."
  primary: spi
  base:
    str: 3
    dex: 4
    int: 5
    spi: 9
  base_hp: 56
  base_mp: 44
  per_level:
    hp: 10
    mp: 10
    str: 1
    dex: 1
    int: 2
    spi: 3
  damage_reduction: 0.08
  skills: ["heal", "smite", "blessing"]
  role: "Поддержка"
  difficulty: 2
  style: "Лечение и благословения — держит группу в живых, сам бьёт слабо."
  newbie_ok: false       # нужно следить за маной и вовремя лечиться — не для первого класса
  pros:
    - "Самолечение почти всегда вытягивает из критичного HP"
    - "«Благословение» усиливает всю группу в комнате"
    - "«Кара» наносит повышенный урон нежити и демонам"
  resource_note: "⚠️ Мана уходит на лечение — не жгите её на слабых мобах."

paladin:
  resource: mana
  name: "Паладин"
  emoji: "🛡"
  desc: "Святой воин. Сочетает крепкую броню и урон от Силы со способностью лечить себя и карать нежить светом."
  primary: str
  base:
    str: 7
    dex: 3
    int: 3
    spi: 6
  base_hp: 64
  base_mp: 30
  per_level:
    hp: 12
    mp: 6
    str: 2
    dex: 1
    int: 1
    spi: 2
  damage_reduction: 0.15
  skills: ["holy_strike", "lay_on_hands", "consecration"]
  role: "Гибрид"
  difficulty: 2
  style: "Танк-лекарь — крепкая броня плюс самолечение светом."
  newbie_ok: false        # общий пул маны на удар и лечение — нужен расчёт
  pros:
    - "Крепкая броня и HP почти как у воина"
    - "«Наложение рук» лечит без отдельного класса-хилера"
    - "«Освящение» карает нежить и демонов по площади"
  resource_note: "⚠️ Одна мана на удар и лечение — распределяйте с умом."

necromancer:
  resource: mana
  name: "Некромант"
  emoji: "💀"
  desc: "Повелитель смерти. Иссушает врагов проклятиями от Интеллекта и питается их жизнью. Хрупок, но смертоносен на расстоянии."
  primary: int
  base:
    str: 2
    dex: 3
    int: 9
    spi: 6
  # Этап 4.1, рычаг (г): hp_base 46→51 (+10%) — самый низкий hp_base в игре; в naive
  # даже с вампиризмом не держит +2-мобов на 7–9 ур. См. docs/BALANCE_ONBOARDING.md.
  base_hp: 51
  base_mp: 48
  per_level:
    hp: 8
    mp: 11
    str: 0
    dex: 1
    int: 3
    spi: 2
  damage_reduction: 0.0
  lifesteal: 0.25
  skills: ["drain_life", "bone_armor", "curse"]
  role: "Урон"
  difficulty: 3
  style: "Дальний урон с вампиризмом — смертоносен, но самый хрупкий класс."
  newbie_ok: false        # самый низкий hp_base в игре, симы naive: без вампиризма не тянет +2-мобов
  pros:
    - "«Иссушение жизни» лечит вас за счёт врага"
    - "«Костяная броня» — единственная защита без брони танка"
    - "«Проклятие» ослабляет опасную цель издалека"
  resource_note: "⚠️ Меньше всего HP в игре — не ввязывайтесь в бой с несколькими врагами."
